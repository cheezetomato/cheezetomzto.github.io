<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 영화 갤러리 🎬</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

        body { font-family: 'Noto Sans KR', sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
        header { text-align: center; padding: 40px 0 20px 0; position: relative; }
        h1 { font-size: 2.5rem; margin: 0; color: #e50914; }
        p.subtitle { color: #b3b3b3; font-size: 1.1rem; margin-top: 10px; }

        .add-btn {
            position: absolute; top: 20px; right: 20px; background-color: #e50914; color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s;
        }
        /* 홈으로 돌아가는 버튼 스타일 */
        .home-btn {
            position: absolute; top: 20px; left: 20px; background-color: #444; color: white; 
            padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 1rem; transition: 0.3s;
        }
        .home-btn:hover { background-color: #666; }
        .add-btn:hover { background-color: #b20710; }

        .nav-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 40px; }
        .search-bar {
            width: 100%; max-width: 600px; padding: 12px 20px; border-radius: 30px; border: 1px solid #444;
            background-color: #1e1e1e; color: white; font-size: 1.1rem; outline: none;
        }
        .search-bar:focus { border-color: #e50914; }

        .nav-tabs { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .nav-tabs button {
            background-color: #333; color: white; border: none; padding: 10px 20px; border-radius: 20px;
            cursor: pointer; font-size: 1rem; transition: 0.3s;
        }
        .nav-tabs button.active, .nav-tabs button:hover { background-color: #e50914; }

        .group-section { margin-bottom: 20px; width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .group-header {
            display: flex; justify-content: space-between; align-items: center; background-color: #1e1e1e;
            padding: 15px 20px; border-radius: 8px; cursor: pointer; border-left: 5px solid #e50914; transition: 0.2s;
        }
        .group-header:hover { background-color: #2b2b2b; }
        .group-title { font-size: 1.3rem; font-weight: bold; margin: 0; color: #fff; }
        .toggle-icon { font-size: 1.2rem; color: #aaa; transition: transform 0.3s; }
        .toggle-icon.open { transform: rotate(180deg); }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding-top: 20px; display: none; }
        .movie-grid.open { display: grid; }
        .movie-card {
            background-color: #1e1e1e; border-radius: 10px; padding: 20px; display: flex; flex-direction: column;
            border: 1px solid #333; transition: transform 0.2s; position: relative;
        }
        .movie-card:hover { transform: translateY(-5px); border-color: #e50914; box-shadow: 0 5px 15px rgba(229,9,20,0.2); }
        .edit-btn {
            position: absolute; top: 15px; right: 15px; background: none; border: none; color: #aaa;
            cursor: pointer; font-size: 1.2rem; display: none; z-index: 10;
        }
        .movie-card:hover .edit-btn { display: block; }
        .edit-btn:hover { color: #fff; }

        .tag-container { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .tag { font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; background: #333; color: #ddd; }
        .tag.region { background: #2b4b6f; }
        .tag.genre { background: #6f2b48; }
        .tag.date { background: #4a4a4a; font-family: monospace; }
        .movie-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 5px; }
        .movie-meta { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
        
        /* 심플해진 별점 스타일 */
        .movie-rating { color: #ffd700; font-size: 1.2rem; margin-bottom: 15px; letter-spacing: 2px; }
        .movie-rating span.score { color: #888; font-size: 0.9rem; letter-spacing: normal; margin-left: 5px; }

        .movie-memo {
            font-size: 0.95rem; color: #ccc; line-height: 1.5; background-color: #2b2b2b;
            padding: 10px; border-radius: 5px; border-left: 3px solid #e50914; flex-grow: 1;
        }

        .empty-msg { text-align: center; color: #777; font-size: 1.2rem; padding: 50px; width: 100%; }

        /* 모달창 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background-color: #1e1e1e; padding: 30px; border-radius: 10px; width: 90%;
            max-width: 450px; border: 1px solid #333; max-height: 90vh; overflow-y: auto; position: relative;
        }
        .modal-content h2 { margin-top: 0; color: #e50914; }
        .modal-content label { display: block; margin-top: 15px; margin-bottom: 5px; font-size: 0.9rem; color: #bbb; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%; box-sizing: border-box; background-color: #2b2b2b; color-scheme: dark;
            color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; font-family: inherit;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background-color: #444; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .btn-save { background-color: #e50914; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }

        /* API 검색 전용 UI */
        .tmdb-search-box { display: flex; gap: 10px; margin-bottom: 5px; }
        .tmdb-search-btn { background-color: #4a4a4a; color: white; border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; white-space: nowrap; }
        .tmdb-search-btn:hover { background-color: #5a5a5a; }

        .search-result-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.95); z-index: 1100; border-radius: 10px;
            flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        .search-result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .search-result-header h3 { margin: 0; color: #fff; font-size: 1.2rem; }
        .close-search-btn { background: none; border: none; color: #aaa; font-size: 1.5rem; cursor: pointer; }
        .close-search-btn:hover { color: #fff; }
        
        #tmdb-results-list { overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }
        .tmdb-item {
            display: flex; gap: 15px; background-color: #2b2b2b; padding: 10px;
            border-radius: 8px; cursor: pointer; transition: 0.2s; align-items: center; border: 1px solid transparent;
        }
        .tmdb-item:hover { background-color: #3b3b3b; border-color: #e50914; }
        .tmdb-poster { width: 50px; height: 75px; object-fit: cover; border-radius: 4px; background-color: #444; }
        .tmdb-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
        .tmdb-item-title { font-weight: bold; font-size: 1.05rem; color: #fff; }
        .tmdb-item-meta { font-size: 0.85rem; color: #aaa; }
        .loading-text { text-align: center; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="home-btn">🏠 홈으로</a>

        <h1>나만의 영화 갤러리 🎬</h1>
        <p class="subtitle" id="stats-subtitle">나의 인생 영화 아카이빙</p>
        <button class="add-btn" onclick="openModal()">+ 영화 추가</button>

    <div class="nav-container">

        <div class="nav-tabs">
            <button id="tab-home" class="active" onclick="changeView('home')">🏠 홈 (최근 감상작)</button>
            <button id="tab-all" onclick="changeView('all')">📋 전체 목록</button>
            <button id="tab-rating" onclick="changeView('rating')">⭐ 평점별 보기</button>
            <button id="tab-genre" onclick="changeView('genre')">🎭 장르별 보기</button>
            <button id="tab-region" onclick="changeView('region')">🌍 국가별 보기</button>
        </div>
    </div>

    <div id="main-content"></div>

    <div class="modal-overlay" id="movie-modal">
        <div class="modal-content">
            <h2 id="modal-title">영화 추가</h2>
            <input type="hidden" id="edit-index">
            
            <label>🔎 영화 자동 검색</label>
            <div class="tmdb-search-box">
                <input type="text" id="search-title-input" placeholder="영화 제목을 검색하세요" onkeypress="if(event.key === 'Enter') { searchTMDB(); event.preventDefault(); }">
                <button type="button" class="tmdb-search-btn" onclick="searchTMDB()">검색</button>
            </div>

            <div class="search-result-overlay" id="search-result-overlay">
                <div class="search-result-header">
                    <h3>검색 결과 🍿</h3>
                    <button type="button" class="close-search-btn" onclick="closeSearchOverlay()">&times;</button>
                </div>
                <div id="tmdb-results-list"></div>
            </div>
            
            <label>영화 제목 (선택됨)</label>
            <input type="text" id="input-title" required>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>국가/지역</label>
                    <select id="input-region" required>
                        <option value="한국">한국</option>
                        <option value="서양">서양 (미국/유럽 등)</option>
                        <option value="일본">일본</option>
                        <option value="홍콩">홍콩</option>
                        <option value="기타">기타 국가</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>장르</label>
                    <input type="text" id="input-genre" placeholder="예: 스릴러, 로맨스" required>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>감독</label>
                    <input type="text" id="input-director" required>
                </div>
                <div style="flex: 1;">
                    <label>개봉 연도</label>
                    <input type="number" id="input-year" required>
                </div>
                <div style="flex: 1;">
                    <label>평점</label>
                    <input type="number" id="input-rating" step="0.5" min="0" max="5" required>
                </div>
            </div>

            <label>시청 날짜 📅</label>
            <input type="date" id="input-watchDate" required>

            <label>한줄평</label>
            <textarea id="input-memo" rows="3" placeholder="기억에 남는 명대사나 감상을 적어주세요!" required></textarea>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">취소</button>
                <button class="btn-save" onclick="saveMovie()">저장하기</button>
            </div>
        </div>
    </div>

            { title:"인턴", watchDate:"2025-12-28", region:"서양", genre:"코미디/드라마", director:"낸시 마이어스", year:2015, rating:3.0, memo:"진정한 어른이란 무엇인지" },
            { title:"악마를 보았다", watchDate:"2026-01-06", region:"한국", genre:"범죄/스릴러", director:"김지운", year:2010, rating:3.0, memo:"잔인하고 그로테스크했던 영화. 악마는 장경철이었다." },
            { title:"이사랑 통역해도 되나요?", watchDate:"2026-01-25", region:"한국", genre:"로맨틱코미디", director:"유영은", year:2025, rating:2.0, memo:"얼굴이 다한 드라마, 이상한 전개방식과 여주의 답답함" },
            { title:"주온", watchDate:"2026-01-17", region:"일본", genre:"공포", director:"시미즈 타카시", year:2002, rating:2.0, memo:"일본의 고전 공포 영화, 너무 오래전 영화인 부분들이 많이 보이는 영화" },
            { title:"신의 한수2", watchDate:"2025-12-12", region:"한국", genre:"범죄/액션", director:"리건", year:2019, rating:1.0, memo:"난 세상이 활활 타올랐으면 좋겠어" }
        ];

        let movies = JSON.parse(localStorage.getItem('myMoviesStarMaster'));
        if (!movies || movies.length < fullMoviesData.length) {
            movies = fullMoviesData;
            localStorage.setItem('myMoviesStarMaster', JSON.stringify(movies));
        }

        let currentView = 'home';
        let searchQuery = '';

        async function searchTMDB() {
            const query = document.getElementById('search-title-input').value;
            if (!query) return;

            const overlay = document.getElementById('search-result-overlay');
            const resultsContainer = document.getElementById('tmdb-results-list');
            
            overlay.style.display = 'flex';
            resultsContainer.innerHTML = '<div class="loading-text">영화를 찾고 있습니다... 🔍</div>';

            const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=ko-KR&query=${encodeURIComponent(query)}&page=1`;
            
            try {
                const response = await fetch(searchUrl);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    const top5 = data.results.slice(0, 5);
                    const detailedResults = await Promise.all(top5.map(async movie => {
                        const detailUrl = `https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&language=ko-KR&append_to_response=credits`;
                        const detailRes = await fetch(detailUrl);
                        return await detailRes.json();
                    }));

                    resultsContainer.innerHTML = ''; 
                    
                    detailedResults.forEach(movie => {
                        const year = movie.release_date ? movie.release_date.split('-')[0] : '연도미상';
                        const posterSrc = movie.poster_path 
                            ? `https://image.tmdb.org/t/p/w92${movie.poster_path}` 
                            : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'; 
                        
                        let directorName = '감독 미상';
                        if (movie.credits && movie.credits.crew) {
                            const director = movie.credits.crew.find(person => person.job === 'Director');
                            if (director) directorName = director.name;
                        }

                        let genreName = '';
                        if (movie.genres && movie.genres.length > 0) {
                            genreName = movie.genres[0].name;
                        }

                        const item = document.createElement('div');
                        item.className = 'tmdb-item';
                        item.innerHTML = `
                            <img src="${posterSrc}" alt="포스터" class="tmdb-poster">
                            <div class="tmdb-info">
                                <span class="tmdb-item-title">${movie.title}</span>
                                <span class="tmdb-item-meta">${year} • ${directorName} 감독</span>
                            </div>
                        `;
                        item.onclick = () => fillFormData(movie.title, year, directorName, genreName);
                        resultsContainer.appendChild(item);
                    });
                } else {
                    resultsContainer.innerHTML = '<div class="loading-text">검색 결과가 없습니다 🥲</div>';
                }
            } catch (error) {
                resultsContainer.innerHTML = '<div class="loading-text">데이터를 불러오는데 실패했습니다. API 키를 확인해주세요.</div>';
            }
        }

        function fillFormData(title, year, director, genre) {
            document.getElementById('input-title').value = title;
            if (year !== '연도미상') document.getElementById('input-year').value = year;
            if (director !== '감독 미상') document.getElementById('input-director').value = director;
            if (genre !== '') document.getElementById('input-genre').value = genre;
            
            document.getElementById('search-title-input').value = '';
            closeSearchOverlay();
        }

        function closeSearchOverlay() { document.getElementById('search-result-overlay').style.display = 'none'; }

        function getChosung(str) {
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            let result = "";
            for(let i=0; i<str.length; i++) {
                let code = str.charCodeAt(i) - 44032;
                if(code > -1 && code < 11172) result += cho[Math.floor(code / 588)];
                else result += str.charAt(i);
            }
            return result;
        }

        // 🌟 수정된 심플 별점 렌더링 로직 (1점 = ★, 0.5점 = ☆)
        function createCardHTML(movie, originalIndex) {
            let starsHTML = '';
            const fullStars = Math.floor(movie.rating);
            const hasHalf = (movie.rating % 1 !== 0);

            // 꽉 찬 별 추가
            for (let i = 0; i < fullStars; i++) {
                starsHTML += '★';
            }
            // 0.5점이 있으면 빈 별 하나 딱 추가
            if (hasHalf) {
                starsHTML += '☆';
            }

            return `
                <div class="movie-card">
                    <button class="edit-btn" onclick="openModal(${originalIndex})">✏️</button>
                    <div class="tag-container">
                        <span class="tag date">${movie.watchDate}</span>
                        <span class="tag region">${movie.region}</span>
                        <span class="tag genre">${movie.genre}</span>
                    </div>
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-meta">${movie.year} • ${movie.director} 감독</div>
                    <div class="movie-rating">${starsHTML} <span class="score">(${parseFloat(movie.rating).toFixed(1)})</span></div>
                    <div class="movie-memo">"${movie.memo}"</div>
                </div>
            `;
        }

        window.toggleSection = function(id) {
            const grid = document.getElementById(`grid-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            if (grid.classList.contains('open')) {
                grid.classList.remove('open'); icon.classList.remove('open');
            } else {
                grid.classList.add('open'); icon.classList.add('open');
            }
        };

        function renderMovies() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';
            document.getElementById('stats-subtitle').innerText = `총 ${movies.length}편의 명작이 기록되어 있어요!`;

            let displayMovies = movies.map((m, index) => ({...m, originalIndex: index}));

            if (searchQuery) {
                const query = searchQuery.replace(/\s/g, '').toLowerCase();
                displayMovies = displayMovies.filter(m => {
                    const titleNoSpace = m.title.replace(/\s/g, '').toLowerCase();
                    const chosung = getChosung(titleNoSpace);
                    return titleNoSpace.includes(query) || chosung.includes(query);
                });
                let html = '<div class="movie-grid open" style="margin: 0 auto; max-width: 1200px;">';
                displayMovies.forEach(m => html += createCardHTML(m, m.originalIndex));
                html += '</div>';
                if(displayMovies.length === 0) html = '<div class="empty-msg">검색 결과가 없습니다 🥲</div>';
                container.innerHTML = html;
                return;
            }

            displayMovies.sort((a, b) => new Date(b.watchDate) - new Date(a.watchDate));

            if (currentView === 'home') {
                let recent = displayMovies.slice(0, 10);
                let html = `
                    <div class="group-section">
                        <div class="group-header" onclick="toggleSection('recent')">
                            <h2 class="group-title">🆕 가장 최근에 본 영화 (10편)</h2>
                            <span class="toggle-icon open" id="icon-recent">▼</span>
                        </div>
                        <div class="movie-grid open" id="grid-recent">
                `;
                recent.forEach(m => html += createCardHTML(m, m.originalIndex));
                html += `</div></div>`;
                container.innerHTML = html;
            } else if (currentView === 'all') {
                let html = '<div class="movie-grid open" style="margin: 0 auto; max-width: 1200px;">';
                displayMovies.forEach(m => html += createCardHTML(m, m.originalIndex));
                html += '</div>';
                container.innerHTML = html;
            } else {
                const groups = {};
                displayMovies.forEach(m => {
                    let groupName = '';
                    if (currentView === 'rating') groupName = `${parseFloat(m.rating).toFixed(1)}점 영화`;
                    else if (currentView === 'genre') groupName = m.genre.includes('/') ? m.genre.split('/')[0] : m.genre;
                    else if (currentView === 'region') groupName = m.region;
                    if(!groups[groupName]) groups[groupName] = [];
                    groups[groupName].push(m);
                });

                let sortedKeys = Object.keys(groups);
                if (currentView === 'rating') sortedKeys.sort((a, b) => parseFloat(b) - parseFloat(a));
                else sortedKeys.sort();

                let html = '';
                sortedKeys.forEach((gName, i) => {
                    const isOpen = i === 0 ? 'open' : '';
                    const safeId = `group-${i}`;
                    html += `
                        <div class="group-section">
                            <div class="group-header" onclick="toggleSection('${safeId}')">
                                <h2 class="group-title">${gName} (${groups[gName].length}편)</h2>
                                <span class="toggle-icon ${isOpen}" id="icon-${safeId}">▼</span>
                            </div>
                            <div class="movie-grid ${isOpen}" id="grid-${safeId}">
                    `;
                    groups[gName].sort((a,b) => new Date(b.watchDate) - new Date(a.watchDate)).forEach(m => html += createCardHTML(m, m.originalIndex));
                    html += `</div></div>`;
                });
                container.innerHTML = html;
            }
        }

        function changeView(view) {
            currentView = view;
            document.querySelectorAll('.nav-tabs button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${view}`).classList.add('active');
            document.getElementById('search-input').value = ''; searchQuery = '';
            renderMovies();
        }

        document.getElementById('search-input').addEventListener('input', function(e) { searchQuery = e.target.value; renderMovies(); });

        function getTodayString() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function openModal(index = -1) {
            document.getElementById('movie-modal').style.display = 'flex';
            closeSearchOverlay(); 
            document.getElementById('search-title-input').value = ''; 
            
            if(index >= 0) {
                document.getElementById('modal-title').innerText = '영화 정보 수정 ✏️';
                document.getElementById('edit-index').value = index;
                document.getElementById('input-title').value = movies[index].title;
                document.getElementById('input-region').value = movies[index].region;
                document.getElementById('input-genre').value = movies[index].genre;
                document.getElementById('input-director').value = movies[index].director;
                document.getElementById('input-year').value = movies[index].year;
                document.getElementById('input-rating').value = movies[index].rating;
                document.getElementById('input-watchDate').value = movies[index].watchDate;
                document.getElementById('input-memo').value = movies[index].memo;
            } else {
                document.getElementById('modal-title').innerText = '새로운 영화 기록하기 🍿';
                document.getElementById('edit-index').value = '';
                document.getElementById('input-title').value = '';
                document.getElementById('input-region').value = '한국';
                document.getElementById('input-genre').value = '';
                document.getElementById('input-director').value = '';
                document.getElementById('input-year').value = '';
                document.getElementById('input-rating').value = '';
                document.getElementById('input-watchDate').value = getTodayString();
                document.getElementById('input-memo').value = '';
            }
        }

        function closeModal() { document.getElementById('movie-modal').style.display = 'none'; }

        function saveMovie() {
            const index = document.getElementById('edit-index').value;
            const newObj = {
                title: document.getElementById('input-title').value,
                region: document.getElementById('input-region').value,
                genre: document.getElementById('input-genre').value,
                director: document.getElementById('input-director').value,
                year: parseInt(document.getElementById('input-year').value),
                rating: parseFloat(document.getElementById('input-rating').value),
                watchDate: document.getElementById('input-watchDate').value,
                memo: document.getElementById('input-memo').value
            };

            if(!newObj.title || !newObj.genre || !newObj.director || isNaN(newObj.year) || isNaN(newObj.rating) || !newObj.watchDate) {
                alert('모든 정보를 빈칸 없이 입력해주세요!');
                return;
            }

            if(index !== '') movies[parseInt(index)] = newObj;
            else movies.push(newObj);

            localStorage.setItem('myMoviesStarMaster', JSON.stringify(movies));
            closeModal(); changeView('all'); 
        }

        renderMovies();
    </script>
