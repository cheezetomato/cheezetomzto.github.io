<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사과 게임 - Pro Version (Real Apple)</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #fff5f5; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 920px; } 

        .overlay { position: absolute; top: -10px; left: -10px; width: calc(100% + 20px); height: calc(100% + 120px); background: #fff5f5; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; border-radius: 20px; }
        .hidden { display: none !important; }

        .btn { width: 220px; padding: 15px; margin: 10px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #e64b4b; }
        .btn-start { background: #ff6b6b; }
        .btn-history { background: #ff9f43; box-shadow: 0 4px 0 #e67e22; }
        .btn-info { background: #54a0ff; box-shadow: 0 4px 0 #2e86de; }
        
        input[type="text"] { padding: 12px; width: 250px; font-size: 16px; border: 2px solid #ffccd2; border-radius: 10px; text-align: center; outline: none; margin-bottom: 25px; }

        #history-layout { display: flex; width: 850px; gap: 20px; margin-bottom: 20px; }
        .history-pane { flex: 1; background: white; padding: 15px; border-radius: 15px; border: 2px solid #ffccd2; height: 350px; overflow-y: auto; }
        .history-pane h3 { margin-top: 0; color: #444; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .record-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f9f9f9; font-size: 13px; }

        #result-screen h2 { font-size: 40px; color: #ff4757; margin: 10px; }
        .result-apple { font-size: 80px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 10px; }
        canvas { background-color: #fff; border: 8px solid #ffccd2; border-radius: 20px; cursor: crosshair; }
        #timer-wrapper { width: 100%; height: 25px; background: #eee; border-radius: 15px; margin-top: 15px; overflow: hidden; border: 2px solid #ddd; }
        #timer-bar { width: 100%; height: 100%; background: #4cd137; }
        #countdown { font-size: 120px; color: #ff6b6b; font-weight: bold; }

        /* 홈으로 돌아가는 버튼 스타일 */
        .home-btn {
            position: absolute; top: 20px; left: 20px; background-color: #444; color: white; 
            padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 1rem; transition: 0.3s; z-index: 1000;
        }
        .home-btn:hover { background-color: #666; }
    </style>
</head>
<body>

<a href="index.html" class="home-btn">🏠 홈으로</a>

<div id="game-container">
    <div id="main-menu" class="overlay">
        <h1 style="color: #ff6b6b; font-size: 48px; margin-bottom: 10px;">🍎 사과 게임</h1>
        <p style="color: #888; margin-bottom: 30px;">180개의 사과를 모두 찾아보세요!</p>
        
        <input type="text" id="nickname" placeholder="닉네임 입력 (최대 15자)" maxlength="15">

        <button class="btn btn-start" onclick="prepareGame()">게임 시작!</button>
        <button class="btn btn-history" onclick="showHistoryScreen()">기록 확인</button>
        <button class="btn btn-info" onclick="showCreator()">게임 제작</button>
    </div>

    <div id="history-screen" class="overlay hidden">
        <h2 style="color: #ff9f43;">📊 데이터 센터</h2>
        <div id="history-layout">
            <div class="history-pane">
                <h3>🏆 역대 TOP 10</h3>
                <div id="top-rank-list"></div>
            </div>
            <div class="history-pane">
                <h3>🕒 최근 기록 10</h3>
                <div id="recent-log-list"></div>
            </div>
        </div>
        <button class="btn" style="background:#666; box-shadow:0 4px 0 #444;" onclick="showMain()">뒤로가기</button>
    </div>

    <div id="hall-screen" class="overlay hidden">
        <h1 style="color: #a55eea; font-size: 40px;">🏅 명예의 전당</h1>
        <p style="font-size: 20px;">축하합니다! 모든 사과를 수확했습니다.</p>
        <div id="hall-of-fame-content" style="background:white; padding:20px; border-radius:15px; border:3px solid #a55eea; margin:20px 0; width:400px; text-align:center;"></div>
        <button class="btn btn-start" onclick="location.reload()">메인으로</button>
    </div>

    <div id="result-screen" class="overlay hidden">
        <div class="result-apple">🍎</div>
        <h2>GAME OVER</h2>
        <div style="font-size: 24px; margin-bottom: 20px;">
            <b id="res-name"></b>님의 점수: <b id="res-score" style="color:#ff4757;">0</b> / 180
        </div>
        <button class="btn btn-start" onclick="location.reload()">다시 하기</button>
    </div>

    <div id="countdown-screen" class="overlay hidden"><div id="countdown">3</div></div>

    <div class="game-header">
        <div style="font-size: 18px; color: #555;">플레이어: <span id="display-name">-</span></div>
        <div style="font-size: 24px; font-weight: bold; color: #ff4757;">Score: <span id="score">0</span> / 180</div>
    </div>
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    <div id="timer-wrapper"><div id="timer-bar"></div></div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerBar = document.getElementById('timer-bar');
    
    const ROWS = 10, COLS = 18, SIZE = 50;
    let apples = [], score = 0, timeLeft = 120, totalTime = 120;
    let isDragging = false, startX, startY, curX, curY;
    let gameActive = false, currentUser = "";

    function showMain() {
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById('main-menu').classList.remove('hidden');
    }

    function showCreator() {
        alert("🍎 사과 게임 제작\n------------------\n기획: 그린토마토\n개발 지원: Gemini");
    }

    function showHistoryScreen() {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('history-screen').classList.remove('hidden');
        const records = JSON.parse(localStorage.getItem('appleRecords') || '[]');
        
        const top10 = [...records].sort((a, b) => b.score - a.score).slice(0, 10);
        document.getElementById('top-rank-list').innerHTML = top10.map((r, i) => `
            <div class="record-row">
                <span><b>${i+1}위</b> ${r.name}</span>
                <span style="color:#ff6b6b;">${r.score}점</span>
            </div>
        `).join('') || "기록 없음";

        const recent10 = records.slice(0, 10);
        document.getElementById('recent-log-list').innerHTML = recent10.map(r => `
            <div class="record-row">
                <span>${r.name} <small>(${r.date})</small></span>
                <span style="color:#ff9f43;">${r.score}점</span>
            </div>
        `).join('') || "기록 없음";
    }

    function prepareGame() {
        const nick = document.getElementById('nickname').value.trim();
        if(!nick) { alert("닉네임을 입력해주세요!"); return; }
        currentUser = nick;
        document.getElementById('display-name').innerText = currentUser;
        document.getElementById('main-menu').classList.add('hidden');
        
        const countScreen = document.getElementById('countdown-screen');
        const countText = document.getElementById('countdown');
        countScreen.classList.remove('hidden');
        
        let count = 3;
        countText.innerText = count;
        const timer = setInterval(() => {
            count--;
            if(count === 0) countText.innerText = "시작!";
            else if (count < 0) {
                clearInterval(timer);
                countScreen.classList.add('hidden');
                startGame();
            } else countText.innerText = count;
        }, 1000);
    }

    function startGame() {
        score = 0; timeLeft = totalTime;
        document.getElementById('score').innerText = "0";
        initApples();
        gameActive = true;
        update();
    }

    function initApples() {
        apples = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                apples.push({ r, c, val: Math.floor(Math.random()*9)+1, removed: false });
            }
        }
    }

    function update() {
        if(!gameActive) return;
        timeLeft -= 0.016;
        const percentage = (timeLeft / totalTime) * 100;
        timerBar.style.width = Math.max(0, percentage) + "%";
        
        if (percentage > 50) timerBar.style.backgroundColor = "#4cd137";
        else if (percentage > 20) timerBar.style.backgroundColor = "#fbc531";
        else timerBar.style.backgroundColor = "#ff4757";

        if(timeLeft <= 0) { endGame(false); return; }
        draw();
        requestAnimationFrame(update);
    }

    function drawRealApple(ctx, x, y, radius) {
        ctx.save();
        ctx.translate(x, y);

        const grad = ctx.createRadialGradient(-radius*0.3, -radius*0.3, radius*0.1, 0, 0, radius);
        grad.addColorStop(0, '#ff9999');
        grad.addColorStop(0.7, '#ff3333');
        grad.addColorStop(1, '#cc0000');

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, -radius*0.4);
        ctx.bezierCurveTo(-radius, -radius, -radius*1.2, radius*0.3, 0, radius*0.8);
        ctx.bezierCurveTo(radius*1.2, radius*0.3, radius, -radius, 0, -radius*0.4);
        ctx.fill();

        ctx.lineWidth = 3;
        ctx.strokeStyle = '#5c4033';
        ctx.beginPath();
        ctx.moveTo(0, -radius*0.3);
        ctx.quadraticCurveTo(radius*0.2, -radius*0.7, radius*0.3, -radius*0.9);
        ctx.stroke();

        ctx.fillStyle = '#4caf50';
        ctx.beginPath();
        ctx.moveTo(radius*0.1, -radius*0.6);
        ctx.quadraticCurveTo(radius*0.6, -radius*0.9, radius*0.8, -radius*0.5);
        ctx.quadraticCurveTo(radius*0.4, -radius*0.2, radius*0.1, -radius*0.6);
        ctx.fill();

        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        apples.forEach(a => {
            if(a.removed) return;
            const x = a.c * SIZE + 25, y = a.r * SIZE + 25;
            
            drawRealApple(ctx, x, y, 18);
            
            ctx.fillStyle = "white"; 
            ctx.font = "bold 20px Arial"; 
            ctx.textAlign = "center";
            ctx.shadowColor = "rgba(0,0,0,0.6)";
            ctx.shadowBlur = 4;
            ctx.fillText(a.val, x, y + 8);
            ctx.shadowBlur = 0; 
        });

        if(isDragging) {
            ctx.strokeStyle = "rgba(255, 107, 107, 0.8)"; ctx.lineWidth = 3;
            ctx.strokeRect(startX, startY, curX - startX, curY - startY);
            ctx.fillStyle = "rgba(255, 107, 107, 0.1)"; ctx.fillRect(startX, startY, curX - startX, curY - startY);
        }
    }

    canvas.onmousedown = e => { if(!gameActive) return; isDragging = true; const r = canvas.getBoundingClientRect(); startX = e.clientX - r.left; startY = e.clientY - r.top; curX = startX; curY = startY; };
    window.onmousemove = e => { if(!isDragging) return; const r = canvas.getBoundingClientRect(); curX = e.clientX - r.left; curY = e.clientY - r.top; };
    window.onmouseup = () => { if(!isDragging) return; isDragging = false; check(); };

    function check() {
        const x1 = Math.min(startX, curX), x2 = Math.max(startX, curX), y1 = Math.min(startY, curY), y2 = Math.max(startY, curY);
        let selected = [], sum = 0;
        apples.forEach(a => {
            if(a.removed) return;
            const ax = a.c * SIZE + 25, ay = a.r * SIZE + 25;
            if(ax >= x1 && ax <= x2 && ay >= y1 && ay <= y2) { selected.push(a); sum += a.val; }
        });
        if(sum === 10) {
            selected.forEach(a => a.removed = true);
            score += selected.length;
            document.getElementById('score').innerText = score;
            if(score >= 180) endGame(true);
        }
    }

    function endGame(isClear) {
        gameActive = false;
        
        const records = JSON.parse(localStorage.getItem('appleRecords') || '[]');
        records.unshift({ name: currentUser, score: score, date: new Date().toLocaleDateString(), remainTime: timeLeft.toFixed(1) });
        localStorage.setItem('appleRecords', JSON.stringify(records.slice(0, 50)));

        if(isClear) {
            document.getElementById('hall-of-fame-content').innerHTML = `
                <h3 style="color:#a55eea;">${currentUser}</h3>
                <p>클리어 타임 기록: <b>${(totalTime - timeLeft).toFixed(1)}초</b></p>
                <p>남은 시간: <span style="color:red;">${timeLeft.toFixed(1)}초</span></p>
            `;
            document.getElementById('hall-screen').classList.remove('hidden');
        } else {
            document.getElementById('res-name').innerText = currentUser;
            document.getElementById('res-score').innerText = score;
            document.getElementById('result-screen').classList.remove('hidden');
        }
    }

    initApples();
    draw();
</script>
</body>
</html>
