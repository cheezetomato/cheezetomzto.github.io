<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Portal</title>
    <style>
        /* 기본 웹 폰트 및 배경 설정 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 메인 타이틀 */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .header p {
            color: #576574;
            font-size: 1.1rem;
            margin: 0;
        }

        /* 메뉴 카드들을 담는 컨테이너 */
        .menu-container {
            display: flex;
            gap: 30px;
            /* 화면이 좁아지면 세로로 배치 */
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        /* 개별 메뉴 카드 스타일 */
        .menu-card {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.9);
            width: 280px;
            height: 320px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        /* 🎬 영화 리스트 카드 전용 색상 */
        .card-movie:hover {
            border-color: #54a0ff;
            box-shadow: 0 15px 35px rgba(84, 160, 255, 0.3);
            transform: translateY(-5px);
        }

        /* 🍎 사과게임 카드 전용 색상 */
        .card-apple:hover {
            border-color: #ff6b6b;
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.3);
            transform: translateY(-5px);
        }

        /* 쫀득하게 눌리는 모션 (핵심!) */
        .menu-card:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* 카드 내부 아이콘 및 텍스트 */
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .menu-card:hover .icon {
            transform: scale(1.1);
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 0.95rem;
            color: #777;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Welcome to My Space</h1>
        <p>원하는 메뉴를 선택해주세요!</p>
    </div>

    <div class="menu-container">
        <a href="movie.html" class="menu-card card-movie">
            <div class="icon">🍿</div>
            <div class="title">영화 컬렉션</div>
            <div class="desc">내가 본 영화들의 기록과 평점을 확인해보세요.</div>
        </a>

        <a href="apple.html" class="menu-card card-apple">
            <div class="icon">🍎</div>
            <div class="title">사과 게임</div>
            <div class="desc">120초 동안 180개의 사과를 수확하는 기록 경쟁!</div>
        </a>
    </div>

</body>
</html>
