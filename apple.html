<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사과 게임 - Pro Version (Real Apple)</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        /* ---------------------------------------------------- */
        /* [1. 테마 변수 설정] */
        /* ---------------------------------------------------- */
        :root {
            /* ☀️ 라이트 모드 */
            --bg-body: #fff5f5;
            --bg-overlay: #fff5f5;
            --text-main: #333;
            --text-desc: #888;
            --canvas-bg: #fff;
            --canvas-border: #ffccd2;
            --pane-bg: #fff;
            --pane-border: #ffccd2;
            --record-border: #eee;

            /* 스위치 라이트 모드 */
            --switch-track: #ccc;
            --switch-knob: #fff;
            --switch-icon: #777;
        }

        body.dark-mode {
            /* 🌙 다크 모드 */
            --bg-body: #121212; 
            --bg-overlay: #232323;
            --text-main: #f0f0f0;
            --text-desc: #b0b0b0;
            --canvas-bg: #2c2c2c;
            --canvas-border: #444;
            --pane-bg: #2c2c2c;
            --pane-border: #444;
            --record-border: #444;

            /* 스위치 다크 모드 */
            --switch-track: #000;
            --switch-knob: #666;
            --switch-icon: #fff;
        }

        /* ---------------------------------------------------- */
        /* [2. 기본 및 게임 요소 CSS] */
        /* ---------------------------------------------------- */
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; overflow: hidden; 
            background-color: var(--bg-body); color: var(--text-main); transition: background-color 0.4s, color 0.4s; 
        }
        #game-container { position: relative; width: 920px; } 

        .overlay { 
            position: absolute; top: -10px; left: -10px; width: calc(100% + 20px); height: calc(100% + 120px); 
            background: var(--bg-overlay); display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 20; border-radius: 20px; transition: background-color 0.4s; 
        }
        .hidden { display: none !important; }

        .btn { width: 220px; padding: 15px; margin: 10px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #e64b4b; }
        .btn-start { background: #ff6b6b; }
        .btn-history { background: #ff9f43; box-shadow: 0 4px 0 #e67e22; }
        .btn-info { background: #54a0ff; box-shadow: 0 4px 0 #2e86de; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        
        input[type="text"] { padding: 12px; width: 250px; font-size: 16px; border: 2px solid var(--pane-border); border-radius: 10px; text-align: center; outline: none; margin-bottom: 25px; background: var(--pane-bg); color: var(--text-main); transition: 0.4s; }

        #history-layout { display: flex; width: 850px; gap: 20px; margin-bottom: 20px; }
        .history-pane { flex: 1; background: var(--pane-bg); padding: 15px; border-radius: 15px; border: 2px solid var(--pane-border); height: 350px; overflow-y: auto; transition: 0.4s; }
        .history-pane h3 { margin-top: 0; color: var(--text-main); border-bottom: 2px solid var(--record-border); padding-bottom: 10px; transition: 0.4s; }
        .record-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--record-border); font-size: 13px; color: var(--text-main); transition: 0.4s; }

        #hall-of-fame-content { background: var(--pane-bg); padding:20px; border-radius:15px; border:3px solid #a55eea; margin:20px 0; width:400px; text-align:center; transition: 0.4s; }

        #result-screen h2 { font-size: 40px; color: #ff4757; margin: 10px; }
        .result-apple { font-size: 80px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 10px; }
        .game-header .player-info { font-size: 18px; color: var(--text-desc); transition: 0.4s; }
        
        canvas { background-color: var(--canvas-bg); border: 8px solid var(--canvas-border); border-radius: 20px; cursor: crosshair; transition: 0.4s; }
        #timer-wrapper { width: 100%; height: 25px; background: #eee; border-radius: 15px; margin-top: 15px; overflow: hidden; border: 2px solid #ddd; }
        body.dark-mode #timer-wrapper { background: #333; border-color: #555; }
        #timer-bar { width: 100%; height: 100%; background: #4cd137; }
        #countdown { font-size: 120px; color: #ff6b6b; font-weight: bold; }

        /* ---------------------------------------------------- */
        /* [3. 상단 네비게이션 (홈 버튼 & 다크모드 스위치)] */
        /* ---------------------------------------------------- */
        
        /* 다크모드 스위치: index.html과 동일하게 좌측 상단 고정 */
        .theme-switch-wrapper {
            position: fixed; 
            top: 20px; 
            left: 20px; 
            display: flex; 
            align-items: center; 
            z-index: 1000;
        }

        .theme-switch { display: inline-block; height: 30px; position: relative; width: 60px; }
        .theme-switch input { display: none; }
        .slider { background-color: var(--switch-track); bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 30px; border: 2px solid rgba(255,255,255,0.1); }
        .slider:before { background-color: var(--switch-knob); bottom: 2px; content: ""; height: 26px; left: 2px; position: absolute; transition: .4s; width: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .slider::after { content: '🌙'; position: absolute; left: 6px; bottom: 5px; transition: .4s; color: var(--switch-icon); font-size: 14px; opacity: 0.5; }
        
        input:checked + .slider:before { transform: translateX(30px); }
        input:checked + .slider::after { transform: translateX(30px); opacity: 1; }

        /* 홈 버튼: 모던하고 심플한 테두리 스타일로 우측 상단 고정 */
        .home-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            padding: 6px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 1000;
        }
        
        .home-btn:hover {
            background-color: var(--text-main);
            color: var(--bg-body);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="theme-switch-wrapper">
    <label class="theme-switch" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="slider round"></div>
    </label>
</div>

<a href="index.html" class="home-btn">Home</a>

<div id="game-container">
    <div id="main-menu" class="overlay">
        <h1 style="color: #ff6b6b; font-size: 48px; margin-bottom: 10px;">🍎 사과 게임</h1>
        <p style="color: var(--text-desc); margin-bottom: 30px;">180개의 사과를 모두 찾아보세요!</p>
        
        <input type="text" id="nickname" placeholder="닉네임 입력 (최대 15자)" maxlength="15">

        <button class="btn btn-start" onclick="window.prepareGame()">게임 시작!</button>
        <button class="btn btn-history" onclick="window.showHistoryScreen()">기록 확인</button>
        <button class="btn btn-info" onclick="window.showCreator()">게임 제작</button>
    </div>

    <div id="history-screen" class="overlay hidden">
        <h2 style="color: #ff9f43;">📊 데이터 센터</h2>
        <div id="history-layout">
            <div class="history-pane">
                <h3>🏆 역대 TOP 10</h3>
                <div id="top-rank-list"></div>
            </div>
            <div class="history-pane">
                <h3>🕒 최근 기록 10</h3>
                <div id="recent-log-list"></div>
            </div>
        </div>
        <button class="btn" style="background:#666; box-shadow:0 4px 0 #444;" onclick="window.showMain()">뒤로가기</button>
    </div>

    <div id="hall-screen" class="overlay hidden">
        <h1 style="color: #a55eea; font-size: 40px;">🏅 명예의 전당</h1>
        <p style="font-size: 20px;">축하합니다! 모든 사과를 수확했습니다.</p>
        <div id="hall-of-fame-content"></div>
        <button class="btn btn-start" onclick="location.reload()">메인으로</button>
    </div>

    <div id="result-screen" class="overlay hidden">
        <div class="result-apple">🍎</div>
        <h2>GAME OVER</h2>
        <div style="font-size: 24px; margin-bottom: 20px;">
            <b id="res-name"></b>님의 점수: <b id="res-score" style="color:#ff4757;">0</b> / 180
        </div>
        <button class="btn btn-start" onclick="location.reload()">다시 하기</button>
    </div>

    <div id="countdown-screen" class="overlay hidden"><div id="countdown">3</div></div>

    <div class="game-header">
        <div class="player-info">플레이어: <span id="display-name" style="font-weight:bold;">-</span></div>
        <div style="font-size: 24px; font-weight: bold; color: #ff4757;">Score: <span id="score">0</span> / 180</div>
    </div>
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    <div id="timer-wrapper"><div id="timer-bar"></div></div>
</div>

<script>
    const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');

    function switchTheme(e) {
        if (e.target.checked) {
            document.body.classList.add('dark-mode');
            localStorage.setItem('theme', 'dark'); 
        } else {
            document.body.classList.remove('dark-mode');
            localStorage.setItem('theme', 'light');
        }
    }
    toggleSwitch.addEventListener('change', switchTheme, false);

    const currentTheme = localStorage.getItem('theme');
    if (currentTheme) {
        if (currentTheme === 'dark') {
            toggleSwitch.checked = true;
            document.body.classList.add('dark-mode');
        }
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC1hcxeEpsGo-N75xyPxWb7RuTjspvpzNw",
        authDomain: "my-first-page-931dd.firebaseapp.com",
        projectId: "my-first-page-931dd",
        storageBucket: "my-first-page-931dd.firebasestorage.app",
        messagingSenderId: "905407958433",
        appId: "1:905407958433:web:e9ea7fa164807ad8ebcfe0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerBar = document.getElementById('timer-bar');
    
    const ROWS = 10, COLS = 18, SIZE = 50;
    let apples = [], score = 0, timeLeft = 120, totalTime = 120;
    let isDragging = false, startX, startY, curX, curY;
    let gameActive = false, currentUser = "";

    window.showMain = function() {
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById('main-menu').classList.remove('hidden');
    }

    window.showCreator = function() {
        alert("🍎 사과 게임 제작\n------------------\n기획: 그린토마토\n개발 지원: Gemini");
    }

    window.showHistoryScreen = async function() {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('history-screen').classList.remove('hidden');
        
        document.getElementById('top-rank-list').innerHTML = "데이터를 불러오는 중... ⏳";
        document.getElementById('recent-log-list').innerHTML = "데이터를 불러오는 중... ⏳";

        try {
            const records = [];
            const querySnapshot = await getDocs(collection(db, "appleRecords"));
            querySnapshot.forEach((doc) => {
                records.push(doc.data());
            });

            const top10 = [...records].sort((a, b) => b.score - a.score).slice(0, 10);
            document.getElementById('top-rank-list').innerHTML = top10.map((r, i) => `
                <div class="record-row">
                    <span><b>${i+1}위</b> ${r.name}</span>
                    <span style="color:#ff6b6b; font-weight:bold;">${r.score}점</span>
                </div>
            `).join('') || "아직 기록이 없습니다.";

            const recent10 = [...records].sort((a, b) => b.timestamp - a.timestamp).slice(0, 10);
            document.getElementById('recent-log-list').innerHTML = recent10.map(r => `
                <div class="record-row">
                    <span>${r.name} <small style="color:var(--text-desc)">(${r.date})</small></span>
                    <span style="color:#ff9f43; font-weight:bold;">${r.score}점</span>
                </div>
            `).join('') || "아직 기록이 없습니다.";
        } catch (error) {
            console.error("기록 불러오기 에러:", error);
            document.getElementById('top-rank-list').innerHTML = "기록을 불러올 수 없습니다.";
        }
    }

    window.prepareGame = function() {
        const nick = document.getElementById('nickname').value.trim();
        if(!nick) { alert("닉네임을 입력해주세요!"); return; }
        currentUser = nick;
        document.getElementById('display-name').innerText = currentUser;
        document.getElementById('main-menu').classList.add('hidden');
        
        const countScreen = document.getElementById('countdown-screen');
        const countText = document.getElementById('countdown');
        countScreen.classList.remove('hidden');
        
        let count = 3;
        countText.innerText = count;
        const timer = setInterval(() => {
            count--;
            if(count === 0) countText.innerText = "시작!";
            else if (count < 0) {
                clearInterval(timer);
                countScreen.classList.add('hidden');
                startGame();
            } else countText.innerText = count;
        }, 1000);
    }

    let gameStartTime; 

    function startGame() {
        score = 0; 
        timeLeft = totalTime;
        gameStartTime = Date.now(); 
        document.getElementById('score').innerText = "0";
        initApples();
        gameActive = true;
        update();
    }

    function initApples() {
        apples = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                apples.push({ r, c, val: Math.floor(Math.random()*9)+1, removed: false });
            }
        }
    }

    function update() {
        if(!gameActive) return;

        const currentTime = Date.now();
        const elapsedTime = (currentTime - gameStartTime) / 1000;
        timeLeft = totalTime - elapsedTime;

        const percentage = (timeLeft / totalTime) * 100;
        timerBar.style.width = Math.max(0, percentage) + "%";
        
        if (percentage > 50) timerBar.style.backgroundColor = "#4cd137";
        else if (percentage > 20) timerBar.style.backgroundColor = "#fbc531";
        else timerBar.style.backgroundColor = "#ff4757";

        if(timeLeft <= 0) { 
            timeLeft = 0;
            endGame(false); 
            return; 
        }
        draw();
        requestAnimationFrame(update);
    }

    function drawRealApple(ctx, x, y, radius) {
        ctx.save();
        ctx.translate(x, y);

        const grad = ctx.createRadialGradient(-radius*0.3, -radius*0.3, radius*0.1, 0, 0, radius);
        grad.addColorStop(0, '#ff9999');
        grad.addColorStop(0.7, '#ff3333');
        grad.addColorStop(1, '#cc0000');

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, -radius*0.4);
        ctx.bezierCurveTo(-radius, -radius, -radius*1.2, radius*0.3, 0, radius*0.8);
        ctx.bezierCurveTo(radius*1.2, radius*0.3, radius, -radius, 0, -radius*0.4);
        ctx.fill();

        ctx.lineWidth = 3;
        ctx.strokeStyle = '#5c4033';
        ctx.beginPath();
        ctx.moveTo(0, -radius*0.3);
        ctx.quadraticCurveTo(radius*0.2, -radius*0.7, radius*0.3, -radius*0.9);
        ctx.stroke();

        ctx.fillStyle = '#4caf50';
        ctx.beginPath();
        ctx.moveTo(radius*0.1, -radius*0.6);
        ctx.quadraticCurveTo(radius*0.6, -radius*0.9, radius*0.8, -radius*0.5);
        ctx.quadraticCurveTo(radius*0.4, -radius*0.2, radius*0.1, -radius*0.6);
        ctx.fill();

        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        apples.forEach(a => {
            if(a.removed) return;
            const x = a.c * SIZE + 25, y = a.r * SIZE + 25;
            
            drawRealApple(ctx, x, y, 18);
            
            ctx.fillStyle = "white"; 
            ctx.font = "bold 20px Arial"; 
            ctx.textAlign = "center";
            ctx.shadowColor = "rgba(0,0,0,0.6)";
            ctx.shadowBlur = 4;
            ctx.fillText(a.val, x, y + 8);
            ctx.shadowBlur = 0; 
        });

        if(isDragging) {
            ctx.strokeStyle = "rgba(255, 107, 107, 0.8)"; ctx.lineWidth = 3;
            ctx.strokeRect(startX, startY, curX - startX, curY - startY);
            ctx.fillStyle = "rgba(255, 107, 107, 0.1)"; ctx.fillRect(startX, startY, curX - startX, curY - startY);
        }
    }

    canvas.onmousedown = e => { if(!gameActive) return; isDragging = true; const r = canvas.getBoundingClientRect(); startX = e.clientX - r.left; startY = e.clientY - r.top; curX = startX; curY = startY; };
    window.onmousemove = e => { if(!isDragging) return; const r = canvas.getBoundingClientRect(); curX = e.clientX - r.left; curY = e.clientY - r.top; };
    window.onmouseup = () => { if(!isDragging) return; isDragging = false; check(); };

    function check() {
        const x1 = Math.min(startX, curX), x2 = Math.max(startX, curX), y1 = Math.min(startY, curY), y2 = Math.max(startY, curY);
        let selected = [], sum = 0;
        apples.forEach(a => {
            if(a.removed) return;
            const ax = a.c * SIZE + 25, ay = a.r * SIZE + 25;
            if(ax >= x1 && ax <= x2 && ay >= y1 && ay <= y2) { selected.push(a); sum += a.val; }
        });
        if(sum === 10) {
            selected.forEach(a => a.removed = true);
            score += selected.length;
            document.getElementById('score').innerText = score;
            if(score >= 180) endGame(true);
        }
    }

    async function endGame(isClear) {
        gameActive = false;
        
        try {
            await addDoc(collection(db, "appleRecords"), {
                name: currentUser,
                score: score,
                date: new Date().toLocaleDateString(),
                timestamp: Date.now() 
            });
        } catch (error) {
            console.error("기록 저장 중 에러 발생:", error);
        }

        if(isClear) {
            document.getElementById('hall-of-fame-content').innerHTML = `
                <h3 style="color:#a55eea;">${currentUser}</h3>
                <p style="color:var(--text-main);">클리어 타임 기록: <b>${(totalTime - timeLeft).toFixed(1)}초</b></p>
                <p style="color:var(--text-main);">남은 시간: <span style="color:red;">${timeLeft.toFixed(1)}초</span></p>
            `;
            document.getElementById('hall-screen').classList.remove('hidden');
        } else {
            document.getElementById('res-name').innerText = currentUser;
            document.getElementById('res-score').innerText = score;
            document.getElementById('result-screen').classList.remove('hidden');
        }
    }

    initApples();
    draw();
</script>
</body>
</html>
