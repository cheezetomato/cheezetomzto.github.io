<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 영화 갤러리 🎬</title>
    <style>
        /* 1. 폰트 및 기본 환경 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            -webkit-font-smoothing: antialiased;
        }

        header { text-align: center; padding: 60px 0 40px 0; position: relative; }
        h1 { font-size: 3rem; font-weight: 700; letter-spacing: -2px; margin: 0; color: #e50914; }
        p.subtitle { color: #86868b; font-size: 1.1rem; margin-top: 12px; font-weight: 400; }

        /* 2. 상단 버튼 섹션 */
        .btn-top {
            position: absolute; top: 20px; color: white; border: none; padding: 10px 22px; 
            border-radius: 980px; cursor: pointer; font-weight: 600; font-size: 0.9rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .home-btn { left: 20px; background-color: rgba(255, 255, 255, 0.1); text-decoration: none; backdrop-filter: blur(10px); }
        .home-btn:hover { background-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }
        
        .add-btn { right: 20px; background-color: #e50914; display: none; box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3); }
        .add-btn:hover { background-color: #ff0a16; transform: scale(1.05); }
        .logout-btn { right: 140px; background-color: #333336; display: none; }
        .logout-btn:hover { background-color: #44444a; }

        .secret-login-btn {
            position: fixed; bottom: 30px; right: 30px; font-size: 1.5rem; 
            background: none; border: none; cursor: pointer; opacity: 0.15; transition: 0.4s; z-index: 999;
        }
        .secret-login-btn:hover { opacity: 0.8; }

        /* 3. 검색 및 내비게이션 */
        .nav-container { display: flex; flex-direction: column; align-items: center; gap: 30px; margin-bottom: 60px; }
        .search-bar {
            width: 100%; max-width: 640px; padding: 16px 24px; border-radius: 18px; border: 1px solid #333336;
            background-color: #1c1c1e; color: white; font-size: 1.1rem; outline: none; transition: all 0.3s;
        }
        .search-bar:focus { border-color: #e50914; background-color: #2c2c2e; box-shadow: 0 0 0 4px rgba(229, 9, 20, 0.1); }

        .nav-tabs { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .nav-tabs button {
            background-color: #1c1c1e; color: #aeaeb2; border: none; padding: 10px 24px; border-radius: 980px;
            cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: 0.2s;
        }
        .nav-tabs button.active, .nav-tabs button:hover { background-color: #e50914; color: white; }

        /* 4. 그룹 및 카드 그리드 */
        .group-section { margin-bottom: 24px; width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .group-header {
            display: flex; justify-content: space-between; align-items: center; background-color: #1c1c1e;
            padding: 20px 28px; border-radius: 16px; cursor: pointer; border-left: 6px solid #e50914; transition: background 0.3s;
        }
        .group-header:hover { background-color: #2c2c2e; }
        .group-title { font-size: 1.4rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; margin: 0; }
        .toggle-icon { font-size: 1.2rem; color: #86868b; transition: transform 0.3s; }
        .toggle-icon.open { transform: rotate(180deg); }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 32px; padding-top: 20px; display: none; }
        .movie-grid.open { display: grid; }
        
        /* 5. 영화 카드 디자인 */
        .movie-card {
            background-color: #1c1c1e; border-radius: 24px; padding: 32px; display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05); transition: all 0.4s cubic-bezier(0.15, 0, 0.5, 1); position: relative;
        }
        .movie-card:hover { transform: scale(1.02) translateY(-8px); border-color: rgba(229, 9, 20, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .edit-btn {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); width: 36px; height: 36px;
            border-radius: 50%; color: #fff; cursor: pointer; font-size: 1rem; display: none; align-items: center; justify-content: center; z-index: 10;
        }
        .movie-card:hover .edit-btn { display: flex; }

        .tag-container { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .tag { font-size: 0.7rem; padding: 4px 10px; border-radius: 6px; font-weight: 600; text-transform: uppercase; }
        .tag.region { background: #0071e3; color: white; }
        .tag.genre { background: #323235; color: #ffd700; }
        .tag.date { background: #48484a; color: #d1d1d6; }

        .movie-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; line-height: 1.2; }
        .movie-meta { font-size: 0.9rem; color: #86868b; margin-bottom: 12px; }
        .movie-rating { color: #ffd700; font-size: 1.1rem; margin-bottom: 18px; letter-spacing: 2px; }
        .movie-rating span.score { color: #86868b; font-size: 0.9rem; letter-spacing: normal; margin-left: 5px; }

        .movie-memo {
            font-size: 0.95rem; color: #d1d1d6; line-height: 1.6; background-color: #2c2c2e;
            padding: 16px; border-radius: 12px; border-left: 3px solid #e50914; flex-grow: 1;
        }

        /* 6. 모달 및 API 검색 UI */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background-color: #1c1c1e; padding: 40px; border-radius: 28px; width: 90%;
            max-width: 450px; border: 1px solid #333336; max-height: 90vh; overflow-y: auto; position: relative;
        }
        .modal-content h2 { margin-top: 0; color: #e50914; font-weight: 700; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%; box-sizing: border-box; background-color: #2c2c2e; color: white;
            border: 1px solid #333336; padding: 12px; border-radius: 10px; margin-top: 5px;
        }
        .btn-save { background-color: #0071e3; color: white; border-radius: 980px; padding: 12px 24px; font-weight: 600; cursor: pointer; border: none; }

        .tmdb-item {
            display: flex; gap: 15px; background-color: #1c1c1e; padding: 12px;
            border-radius: 14px; cursor: pointer; border: 1px solid #333336; transition: 0.2s;
        }
        .tmdb-item:hover { background-color: #2c2c2e; border-color: #e50914; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-top home-btn">🏠 홈으로</a>
        
        <button class="btn-top logout-btn" id="logout-btn" onclick="window.doLogout()">로그아웃</button>
        <button class="btn-top add-btn" id="add-movie-btn" onclick="window.openModal()">+ 영화 추가</button>

        <h1>나만의 영화 갤러리 🎬</h1>
        <p class="subtitle" id="stats-subtitle">나의 인생 영화 아카이빙</p>
    </header>

    <div class="nav-container">
        <input type="text" id="search-input" class="search-bar" placeholder="영화 제목이나 초성을 검색해보세요 (예: ㅎㅇㅈ)">
        <div class="nav-tabs">
            <button id="tab-home" class="active" onclick="window.changeView('home')">🏠 홈 (최근 감상작)</button>
            <button id="tab-all" onclick="window.changeView('all')">📋 전체 목록</button>
            <button id="tab-rating" onclick="window.changeView('rating')">⭐ 평점별 보기</button>
            <button id="tab-genre" onclick="window.changeView('genre')">🎭 장르별 보기</button>
            <button id="tab-region" onclick="window.changeView('region')">🌍 국가별 보기</button>
        </div>
    </div>

    <div id="main-content"></div>

    <button class="secret-login-btn" id="secret-login-btn" onclick="window.openLoginModal()" title="관리자 로그인">🔒</button>

    <div class="modal-overlay" id="login-modal">
        <div class="modal-content">
            <h2>🔐 관리자 로그인</h2>
            <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">관리자 권한에 접근하시겠습니까?</p>
            <input type="email" id="login-email" placeholder="이메일 입력" style="margin-bottom: 10px;">
            <input type="password" id="login-password" placeholder="비밀번호 입력">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="window.closeLoginModal()">취소</button>
                <button class="btn-save" onclick="window.doLogin()">로그인</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="movie-modal">
        <div class="modal-content">
            <h2 id="modal-title">영화 추가</h2>
            <input type="hidden" id="edit-index">
            
            <label>🔎 영화 자동 검색</label>
            <div class="tmdb-search-box">
                <input type="text" id="search-title-input" placeholder="영화 제목을 검색하세요" onkeypress="if(event.key === 'Enter') { window.searchTMDB(); event.preventDefault(); }">
                <button type="button" class="tmdb-search-btn" onclick="window.searchTMDB()">검색</button>
            </div>

            <div class="search-result-overlay" id="search-result-overlay">
                <div class="search-result-header">
                    <h3>검색 결과 🍿</h3>
                    <button type="button" class="close-search-btn" onclick="window.closeSearchOverlay()">&times;</button>
                </div>
                <div id="tmdb-results-list"></div>
            </div>
            
            <label>영화 제목 (선택됨)</label>
            <input type="text" id="input-title" required>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>국가/지역</label>
                    <select id="input-region" required>
                        <option value="한국">한국</option>
                        <option value="서양">서양 (미국/유럽 등)</option>
                        <option value="일본">일본</option>
                        <option value="홍콩">홍콩</option>
                        <option value="기타">기타 국가</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>장르</label>
                    <input type="text" id="input-genre" placeholder="예: 스릴러, 로맨스" required>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>감독</label>
                    <input type="text" id="input-director" required>
                </div>
                <div style="flex: 1;">
                    <label>개봉 연도</label>
                    <input type="number" id="input-year" required>
                </div>
                <div style="flex: 1;">
                    <label>평점</label>
                    <input type="number" id="input-rating" step="0.5" min="0" max="5" required>
                </div>
            </div>

            <label>시청 날짜 📅</label>
            <input type="date" id="input-watchDate" required>

            <label>한줄평</label>
            <textarea id="input-memo" rows="3" placeholder="기억에 남는 명대사나 감상을 적어주세요!" required></textarea>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="window.closeModal()">취소</button>
                <button class="btn-save" onclick="window.saveMovie()">저장하기</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        // 로그인 기능을 위한 Auth 추가
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1hcxeEpsGo-N75xyPxWb7RuTjspvpzNw",
            authDomain: "my-first-page-931dd.firebaseapp.com",
            projectId: "my-first-page-931dd",
            storageBucket: "my-first-page-931dd.firebasestorage.app",
            messagingSenderId: "905407958433",
            appId: "1:905407958433:web:e9ea7fa164807ad8ebcfe0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); // 로그인 기능 초기화

        const TMDB_API_KEY = 'e278ce0c0cebe5a0bc50bbb80474f592';
        
        let movies = [];
        let currentView = 'home';
        let searchQuery = '';
        let isAdmin = false; // 현재 로그인 상태를 저장하는 변수

        // 🌟 로그인 상태 감지기 (페이지 접속 시, 로그인/로그아웃 시 자동 실행)
        onAuthStateChanged(auth, (user) => {
            if (user && user.uid === 'LjObLa6943Q1xyyVthX2aFA1zRQ2') {
                // UID가 내 것과 일치하면 관리자 모드 ON
                isAdmin = true;
                document.getElementById('add-movie-btn').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'block';
                document.getElementById('secret-login-btn').style.display = 'none';
            } else {
                // 로그인 안 했거나 남이면 관리자 모드 OFF
                isAdmin = false;
                document.getElementById('add-movie-btn').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'none';
                document.getElementById('secret-login-btn').style.display = 'block';
            }
            renderMovies(); // 권한에 따라 화면 싹 다시 그리기 (수정 버튼 숨기기/보이기)
        });

        // 🌟 로그인 로직
        window.openLoginModal = () => document.getElementById('login-modal').style.display = 'flex';
        window.closeLoginModal = () => document.getElementById('login-modal').style.display = 'none';
        
        window.doLogin = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                alert("창조자님, 환영합니다! 🙇‍♂️");
                window.closeLoginModal();
            } catch (error) {
                alert("아이디나 비밀번호가 틀렸습니다.");
            }
        };

        window.doLogout = async () => {
            if(confirm("로그아웃 하시겠습니까?")) {
                await signOut(auth);
                alert("로그아웃 되었습니다.");
            }
        };

        // 파이어베이스 데이터 로드
        async function loadMoviesFromFirebase() {
            document.getElementById('main-content').innerHTML = '<div class="empty-msg">클라우드에서 영화 기록을 불러오는 중입니다... 🍿</div>';
            try {
                const snapshot = await getDocs(collection(db, "myMoviesGallery"));
                movies = [];
                snapshot.forEach(doc => {
                    movies.push({ ...doc.data(), id: doc.id });
                });
                renderMovies();
            } catch (error) {
                console.error("데이터 로딩 실패:", error);
                document.getElementById('main-content').innerHTML = '<div class="empty-msg">데이터를 불러오지 못했습니다. 새로고침 해주세요!</div>';
            }
        }

        // --- 이 아래는 기존 TMDB 검색, 렌더링, 저장 관련 함수들 (동일함) ---

    // 💡 [비밀 무기 1] TMDB 검색을 담당하는 짧은 도우미 함수
        async function fetchMoviesFromTMDB(searchQuery) {
            const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=ko-KR&query=${encodeURIComponent(searchQuery)}&page=1`;
            const response = await fetch(url);
            return await response.json();
        }

        // 💡 [비밀 무기 2] 자동 띄어쓰기 기계 (6~8글자 시리즈물도 커버하도록 업그레이드!)
        function getSpaceVariations(str) {
            if (str.includes(' ') || str.length < 2 || str.length > 8) return [];
            const vars = [];
            if (str.length === 3) { vars.push(str.slice(0,1)+' '+str.slice(1), str.slice(0,2)+' '+str.slice(2)); }
            else if (str.length === 4) { vars.push(str.slice(0,2)+' '+str.slice(2), str.slice(0,1)+' '+str.slice(1), str.slice(0,3)+' '+str.slice(3)); }
            else if (str.length === 5) { vars.push(str.slice(0,2)+' '+str.slice(2), str.slice(0,3)+' '+str.slice(3)); }
            else if (str.length === 6) { vars.push(str.slice(0,2)+' '+str.slice(2), str.slice(0,3)+' '+str.slice(3), str.slice(0,4)+' '+str.slice(4)); }
            else if (str.length === 7) { vars.push(str.slice(0,3)+' '+str.slice(3), str.slice(0,4)+' '+str.slice(4)); }
            else if (str.length === 8) { vars.push(str.slice(0,4)+' '+str.slice(4)); }
            return vars;
        }

        // 🌟 메인 검색 함수 (무조건 띄어쓰기 병합 + 인기도 정렬 + 10개 출력 완결판)
        window.searchTMDB = async function() {
            const query = document.getElementById('search-title-input').value.trim();
            if (!query) return;

            const overlay = document.getElementById('search-result-overlay');
            const resultsContainer = document.getElementById('tmdb-results-list');
            
            overlay.style.display = 'flex';
            resultsContainer.innerHTML = '<div class="loading-text">영화 데이터를 끌어모으고 있습니다... 🚀</div>';

            try {
                // 1. 원본 검색어와 띄어쓰기 변형 검색어를 모두 리스트에 담습니다.
                let searchQueries = [query];
                if (!query.includes(' ')) {
                    searchQueries = searchQueries.concat(getSpaceVariations(query));
                }

                // 2. 준비된 모든 검색어로 TMDB에 동시에 요청을 보냅니다! (결과 싹쓸이)
                const fetchPromises = searchQueries.map(q => fetchMoviesFromTMDB(q));
                const responses = await Promise.all(fetchPromises);

                // 3. 받아온 모든 결과를 하나의 배열에 쏟아붓습니다.
                let allMovies = [];
                responses.forEach(res => {
                    if (res.results) allMovies.push(...res.results);
                });

                // 4. 중복 제거 (다크나이트, 다크 나이트 둘 다 검색돼서 똑같은 영화가 2번 들어오는 것 방지)
                const uniqueMovies = [];
                const seenIds = new Set();
                for (const movie of allMovies) {
                    if (!seenIds.has(movie.id)) {
                        seenIds.add(movie.id);
                        uniqueMovies.push(movie);
                    }
                }

                // 5. ⭐️ 핵심: TMDB 인기도(popularity) 점수가 높은 순서대로 줄을 세웁니다! (듣보잡 방지)
                uniqueMovies.sort((a, b) => b.popularity - a.popularity);

                if (uniqueMovies.length > 0) {
                    // 6. 상위 10개(기존 5개)를 잘라서 감독/국가 등 상세 정보를 가져옵니다.
                    const top10 = uniqueMovies.slice(0, 10);
                    const detailedResults = await Promise.all(top10.map(async movie => {
                        const detailUrl = `https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&language=ko-KR&append_to_response=credits`;
                        const detailRes = await fetch(detailUrl);
                        return await detailRes.json();
                    }));

                    resultsContainer.innerHTML = ''; 
                    
                    detailedResults.forEach(movie => {
                        const year = movie.release_date ? movie.release_date.split('-')[0] : '연도미상';
                        const posterSrc = movie.poster_path 
                            ? `https://image.tmdb.org/t/p/w92${movie.poster_path}` 
                            : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'; 
                        
                        let directorName = '감독 미상';
                        if (movie.credits && movie.credits.crew) {
                            const director = movie.credits.crew.find(person => person.job === 'Director');
                            if (director) directorName = director.name;
                        }

                        let genreName = '';
                        if (movie.genres && movie.genres.length > 0) {
                            genreName = movie.genres[0].name;
                        }

                        // 🌍 국가 자동 매핑 
                        let regionValue = '기타';
                        if (movie.production_countries && movie.production_countries.length > 0) {
                            const countryCode = movie.production_countries[0].iso_3166_1;
                            const western = ['US', 'GB', 'FR', 'DE', 'IT', 'ES', 'CA', 'AU', 'NZ', 'IE', 'SE', 'DK', 'NO', 'FI', 'NL', 'BE', 'CH', 'AT'];
                            
                            if (countryCode === 'KR') regionValue = '한국';
                            else if (countryCode === 'JP') regionValue = '일본';
                            else if (countryCode === 'HK' || countryCode === 'CN' || countryCode === 'TW') regionValue = '홍콩';
                            else if (western.includes(countryCode)) regionValue = '서양';
                        }

                        const item = document.createElement('div');
                        item.className = 'tmdb-item';
                        item.innerHTML = `
                            <img src="${posterSrc}" alt="포스터" class="tmdb-poster">
                            <div class="tmdb-info">
                                <span class="tmdb-item-title">${movie.title}</span>
                                <span class="tmdb-item-meta">${year} • ${directorName} 감독</span>
                            </div>
                        `;
                        // 클릭 시 폼 채우기 함수 호출
                        item.onclick = () => window.fillFormData(movie.title, year, directorName, genreName, regionValue);
                        resultsContainer.appendChild(item);
                    });
                } else {
                    resultsContainer.innerHTML = `
                        <div class="loading-text" style="line-height: 1.6;">
                            검색 결과가 없습니다 🥲<br>
                            <span style="font-size: 0.9rem; color: #888;">정확한 영화 제목인지 확인해 주세요!</span>
                        </div>`;
                }
            } catch (error) {
                resultsContainer.innerHTML = '<div class="loading-text">데이터를 불러오는데 실패했습니다.</div>';
            }
        }

        window.fillFormData = function(title, year, director, genre, region) {
            document.getElementById('input-title').value = title;
            if (year !== '연도미상') document.getElementById('input-year').value = year;
            if (director !== '감독 미상') document.getElementById('input-director').value = director;
            if (genre !== '') document.getElementById('input-genre').value = genre;
            
            // 🌍 받아온 국가 정보로 카테고리 자동 선택!
            if (region) document.getElementById('input-region').value = region; 
            
            document.getElementById('search-title-input').value = '';
            window.closeSearchOverlay();
        }

        window.closeSearchOverlay = function() { document.getElementById('search-result-overlay').style.display = 'none'; }

        function getChosung(str) {
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            let result = "";
            for(let i=0; i<str.length; i++) {
                let code = str.charCodeAt(i) - 44032;
                if(code > -1 && code < 11172) result += cho[Math.floor(code / 588)];
                else result += str.charAt(i);
            }
            return result;
        }

        function createCardHTML(movie, originalIndex) {
            let starsHTML = '';
            const fullStars = Math.floor(movie.rating);
            const hasHalf = (movie.rating % 1 !== 0);

            for (let i = 0; i < fullStars; i++) starsHTML += '★';
            if (hasHalf) starsHTML += '☆';

            // 🔑 isAdmin이 true일 때만 수정 버튼(✏️)을 보여줌!
            const editBtnHTML = isAdmin ? `<button class="edit-btn" onclick="window.openModal(${originalIndex})">✏️</button>` : '';

            return `
                <div class="movie-card">
                    ${editBtnHTML}
                    <div class="tag-container">
                        <span class="tag date">${movie.watchDate}</span>
                        <span class="tag region">${movie.region}</span>
                        <span class="tag genre">${movie.genre}</span>
                    </div>
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-meta">${movie.year} • ${movie.director} 감독</div>
                    <div class="movie-rating">${starsHTML} <span class="score">(${parseFloat(movie.rating).toFixed(1)})</span></div>
                    <div class="movie-memo">${movie.memo}</div>
                </div>
            `;
        }

        window.toggleSection = function(id) {
            const grid = document.getElementById(`grid-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            if (grid.classList.contains('open')) {
                grid.classList.remove('open'); icon.classList.remove('open');
            } else {
                grid.classList.add('open'); icon.classList.add('open');
            }
        };

        function renderMovies() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';
            document.getElementById('stats-subtitle').innerText = `총 ${movies.length}편의 명작이 기록되어 있어요!`;

            let displayMovies = movies.map((m, index) => ({...m, originalIndex: index}));

            if (searchQuery) {
                const query = searchQuery.replace(/\s/g, '').toLowerCase();
                displayMovies = displayMovies.filter(m => {
                    const titleNoSpace = m.title.replace(/\s/g, '').toLowerCase();
                    const chosung = getChosung(titleNoSpace);
                    return titleNoSpace.includes(query) || chosung.includes(query);
                });
                let html = '<div class="movie-grid open" style="margin: 0 auto; max-width: 1200px;">';
                displayMovies.forEach(m => html += createCardHTML(m, m.originalIndex));
                html += '</div>';
                if(displayMovies.length === 0) html = '<div class="empty-msg">검색 결과가 없습니다 🥲</div>';
                container.innerHTML = html;
                return;
            }

            displayMovies.sort((a, b) => new Date(b.watchDate) - new Date(a.watchDate));

            if (currentView === 'home') {
                let recent = displayMovies.slice(0, 10);
                let html = `
                    <div class="group-section">
                        <div class="group-header" onclick="window.toggleSection('recent')">
                            <h2 class="group-title">🆕 가장 최근에 본 영화 (10편)</h2>
                            <span class="toggle-icon open" id="icon-recent">▼</span>
                        </div>
                        <div class="movie-grid open" id="grid-recent">
                `;
                recent.forEach(m => html += createCardHTML(m, m.originalIndex));
                html += `</div></div>`;
                container.innerHTML = html;
            } else if (currentView === 'all') {
                let html = '<div class="movie-grid open" style="margin: 0 auto; max-width: 1200px;">';
                displayMovies.forEach(m => html += createCardHTML(m, m.originalIndex));
                html += '</div>';
                container.innerHTML = html;
            } else {
                const groups = {};
                displayMovies.forEach(m => {
                    let groupName = '';
                    if (currentView === 'rating') groupName = `${parseFloat(m.rating).toFixed(1)}점 영화`;
                    else if (currentView === 'genre') groupName = m.genre.includes('/') ? m.genre.split('/')[0] : m.genre;
                    else if (currentView === 'region') groupName = m.region;
                    if(!groups[groupName]) groups[groupName] = [];
                    groups[groupName].push(m);
                });

                let sortedKeys = Object.keys(groups);
                if (currentView === 'rating') sortedKeys.sort((a, b) => parseFloat(b) - parseFloat(a));
                else sortedKeys.sort();

                let html = '';
                sortedKeys.forEach((gName, i) => {
                    const isOpen = i === 0 ? 'open' : '';
                    const safeId = `group-${i}`;
                    html += `
                        <div class="group-section">
                            <div class="group-header" onclick="window.toggleSection('${safeId}')">
                                <h2 class="group-title">${gName} (${groups[gName].length}편)</h2>
                                <span class="toggle-icon ${isOpen}" id="icon-${safeId}">▼</span>
                            </div>
                            <div class="movie-grid ${isOpen}" id="grid-${safeId}">
                    `;
                    groups[gName].sort((a,b) => new Date(b.watchDate) - new Date(a.watchDate)).forEach(m => html += createCardHTML(m, m.originalIndex));
                    html += `</div></div>`;
                });
                container.innerHTML = html;
            }
        }

        window.changeView = function(view) {
            currentView = view;
            document.querySelectorAll('.nav-tabs button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${view}`).classList.add('active');
            document.getElementById('search-input').value = ''; searchQuery = '';
            renderMovies();
        }

        document.getElementById('search-input').addEventListener('input', function(e) { searchQuery = e.target.value; renderMovies(); });

        function getTodayString() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        window.openModal = function(index = -1) {
            document.getElementById('movie-modal').style.display = 'flex';
            window.closeSearchOverlay(); 
            document.getElementById('search-title-input').value = ''; 
            
            if(index >= 0) {
                document.getElementById('modal-title').innerText = '영화 정보 수정 ✏️';
                document.getElementById('edit-index').value = index;
                document.getElementById('input-title').value = movies[index].title;
                document.getElementById('input-region').value = movies[index].region;
                document.getElementById('input-genre').value = movies[index].genre;
                document.getElementById('input-director').value = movies[index].director;
                document.getElementById('input-year').value = movies[index].year;
                document.getElementById('input-rating').value = movies[index].rating;
                document.getElementById('input-watchDate').value = movies[index].watchDate;
                document.getElementById('input-memo').value = movies[index].memo;
            } else {
                document.getElementById('modal-title').innerText = '새로운 영화 기록하기 🍿';
                document.getElementById('edit-index').value = '';
                document.getElementById('input-title').value = '';
                document.getElementById('input-region').value = '한국';
                document.getElementById('input-genre').value = '';
                document.getElementById('input-director').value = '';
                document.getElementById('input-year').value = '';
                document.getElementById('input-rating').value = '';
                document.getElementById('input-watchDate').value = getTodayString();
                document.getElementById('input-memo').value = '';
            }
        }

        window.closeModal = function() { document.getElementById('movie-modal').style.display = 'none'; }

        window.saveMovie = async function() {
            const index = document.getElementById('edit-index').value;
            const newObj = {
                title: document.getElementById('input-title').value,
                region: document.getElementById('input-region').value,
                genre: document.getElementById('input-genre').value,
                director: document.getElementById('input-director').value,
                year: parseInt(document.getElementById('input-year').value),
                rating: parseFloat(document.getElementById('input-rating').value),
                watchDate: document.getElementById('input-watchDate').value,
                memo: document.getElementById('input-memo').value
            };

            if(!newObj.title || !newObj.genre || !newObj.director || isNaN(newObj.year) || isNaN(newObj.rating) || !newObj.watchDate) {
                alert('모든 정보를 빈칸 없이 입력해주세요!');
                return;
            }

            const saveBtn = document.querySelector('.btn-save');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = "저장 중...";
            saveBtn.disabled = true;

            try {
                if(index !== '') {
                    const movieId = movies[parseInt(index)].id;
                    await updateDoc(doc(db, "myMoviesGallery", movieId), newObj);
                    movies[parseInt(index)] = { ...newObj, id: movieId };
                } else {
                    const docRef = await addDoc(collection(db, "myMoviesGallery"), newObj);
                    movies.push({ ...newObj, id: docRef.id });
                }
                window.closeModal(); 
                window.changeView('all'); 
            } catch (error) {
                console.error("저장 에러:", error);
                alert("권한이 없거나 저장 중 문제가 발생했습니다.");
            } finally {
                saveBtn.innerText = originalText;
                saveBtn.disabled = false;
            }
        }

        loadMoviesFromFirebase();
    </script>
</body>
</html>
