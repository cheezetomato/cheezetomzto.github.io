<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 영화 갤러리 | 레터박스 스타일 🎬</title>
    <style>
        /* 1. Letterboxd 스타일 폰트 및 컬러 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: #14181c; /* 레터박스 딥 다크 배경색 */
            color: #d8e0e8; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a { text-decoration: none; color: inherit; transition: color 0.2s; }
        a:hover { color: #00e054; } /* 레터박스 시그니처 초록색 */

        /* 2. 상단 바 */
        header { 
            background-color: #0d0f11; 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            z-index: 1000; 
            box-sizing: border-box; 
            border-bottom: 1px solid #2c3440;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: -1px; }
        .menu-toggle { font-size: 1.5rem; background: none; border: none; color: #9ab; cursor: pointer; padding: 0; transition: color 0.2s;}
        .menu-toggle:hover { color: #fff; }

        .header-right { display: flex; align-items: center; gap: 10px; }
        .admin-btn, .logout-btn { 
            font-size: 0.85rem; font-weight: 600; padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: background 0.2s; 
            border: none; 
        }
        .admin-btn { background-color: #00e054; color: #14181c; display: none; }
        .admin-btn:hover { background-color: #00b040; }
        .logout-btn { background-color: #2c3440; color: #9ab; display: none; }
        .logout-btn:hover { background-color: #445566; color: #fff; }
        
        .secret-login-btn { 
            font-size: 1rem; background: none; border: none; color: #6d7e8e; cursor: pointer; transition: opacity 0.4s; opacity: 0.2; 
        }
        .secret-login-btn:hover { opacity: 0.8; }

        /* 3. 사이드 메뉴바 */
        .side-menu-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1001; 
            justify-content: flex-start; 
        }
        .side-menu { 
            background-color: #14181c; width: 250px; height: 100%; padding: 60px 20px; box-sizing: border-box; 
            display: flex; flex-direction: column; gap: 20px; 
            transform: translateX(-100%); transition: transform 0.3s ease-out; 
            border-right: 1px solid #2c3440;
        }
        .side-menu.open { transform: translateX(0); }
        .side-menu a { font-size: 1.1rem; font-weight: 500; color: #9ab; }
        .side-menu a:hover { color: #fff; }
        .close-menu-btn { 
            position: absolute; top: 15px; right: 15px; font-size: 1.5rem; 
            background: none; border: none; color: #9ab; cursor: pointer; 
        }

        /* 4. 메인 콘텐츠 구조 */
        main { padding-top: 60px; flex-grow: 1; }

        .section { padding: 30px 20px; max-width: 1000px; margin: 0 auto; width: 100%; box-sizing: border-box; border-bottom: 1px solid #2c3440; }
        .section:last-of-type { border-bottom: none; }
        .section-header { margin-bottom: 15px; }
        .section-title { font-size: 1.2rem; font-weight: 600; color: #fff; letter-spacing: -0.5px; margin: 0 0 5px 0; text-transform: uppercase; border-bottom: 1px solid #445566; padding-bottom: 5px; display: inline-block;}
        .section-desc { color: #9ab; font-size: 0.9rem; margin-top: 8px; font-weight: 400; line-height: 1.4; }

        /* 5. 컴팩트 포스터 그리드 (세로 길이 확 줄임!) */
        .movie-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 12px; 
            margin-top: 15px;
        }
        
        .movie-card {
            background-color: transparent; border-radius: 4px; overflow: hidden; 
            position: relative; transition: all 0.2s ease; aspect-ratio: 2/3;
            border: 2px solid transparent; /* 호버 시 나타날 테두리 공간 */
            box-sizing: border-box;
        }
        
        .movie-card:hover { 
            border-color: #00e054; /* 레터박스 초록색 테두리 */
            transform: scale(1.05); 
            z-index: 2; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        }

        .poster-wrapper { width: 100%; height: 100%; }
        .tmdb-poster { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }

        /* 포스터 위에 마우스 올렸을 때 나타나는 정보 */
        .poster-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 24, 28, 0.9);
            color: white; padding: 10px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            opacity: 0; transition: opacity 0.2s ease;
        }
        .movie-card:hover .poster-overlay { opacity: 1; }
        
        .overlay-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; line-height: 1.2; }
        .overlay-rating { color: #00e054; font-size: 0.85rem; font-weight: bold; }
        .overlay-memo { font-size: 0.7rem; color: #9ab; margin-top: 8px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .edit-btn {
            position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); width: 26px; height: 26px;
            border-radius: 50%; color: #fff; cursor: pointer; font-size: 0.8rem; display: none; align-items: center; justify-content: center; z-index: 10; border: 1px solid #445566;
        }
        .movie-card:hover .edit-btn { display: flex; }

        /* 6. 모달 및 로그인 UI */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background-color: #2c3440; padding: 30px; border-radius: 8px; width: 90%;
            max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto;
        }
        .modal-content h2 { margin-top: 0; color: #fff; font-weight: 600; font-size: 1.4rem; }
        .modal-content label { color: #9ab; font-size: 0.85rem; margin-top: 10px; display: block; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%; box-sizing: border-box; background-color: #14181c; color: white;
            border: 1px solid #445566; padding: 10px; border-radius: 4px; margin-top: 5px; font-family: inherit;
        }
        .modal-content input:focus, .modal-content textarea:focus { outline: none; border-color: #00e054; }
        .btn-save { background-color: #00e054; color: #14181c; border-radius: 4px; padding: 10px 20px; font-weight: 700; cursor: pointer; border: none; }
        .btn-cancel { background-color: #445566; color: white; border-radius: 4px; padding: 10px 20px; font-weight: 600; cursor: pointer; border: none; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

        .tmdb-search-box { display: flex; gap: 5px; margin-top: 5px; }
        .tmdb-search-btn { background-color: #445566; color: white; padding: 10px 15px; border-radius: 4px; cursor: pointer; border: none; }
        
        .search-result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2001; justify-content: center; align-items: center; }
        .search-result-content { background: #2c3440; padding: 20px; border-radius: 8px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-search-btn { font-size: 1.5rem; background: none; border: none; color: #9ab; cursor: pointer; position: absolute; top: 10px; right: 10px; }
        
        .tmdb-item { display: flex; gap: 15px; background-color: #14181c; padding: 10px; border-radius: 6px; cursor: pointer; border: 1px solid #445566; transition: 0.2s; margin-bottom: 10px;}
        .tmdb-item:hover { border-color: #00e054; }
        .tmdb-poster-small { width: 50px; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; }
        .tmdb-info-small { display: flex; flex-direction: column; justify-content: center; }
        .tmdb-item-title-small { font-weight: 600; color: white; font-size: 1rem; }
        .tmdb-item-meta-small { font-size: 0.8rem; color: #9ab; margin-top: 4px; }

        /* 7. 푸터 디자인 */
        footer { 
            background-color: #0d0f11; color: #6d7e8e; padding: 40px 20px; text-align: center; font-size: 0.85rem; border-top: 1px solid #2c3440; margin-top: auto; 
        }
        .footer-links { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-toggle" id="menu-toggle" onclick="window.toggleMenu()">☰</button>
            <a href="#" class="logo">FILMS</a>
        </div>
        
        <div class="header-right">
            <button class="secret-login-btn" id="secret-login-btn" onclick="window.openLoginModal()" title="관리자 로그인">🔒</button>
            <button class="admin-btn" id="auto-update-btn" onclick="window.autoFixPosters()" style="background-color: #0071e3; color: white;">✨ 포스터 일괄 복구</button>
            <button class="admin-btn" id="add-movie-btn" onclick="window.openModal()">+ LOG FILM</button>
            <button class="logout-btn" id="logout-btn" onclick="window.doLogout()">LOGOUT</button>
        </div>
    </header>

    <div class="side-menu-overlay" id="side-menu-overlay" onclick="window.toggleMenu(false)">
        <div class="side-menu" id="side-menu" onclick="event.stopPropagation()">
            <button class="close-menu-btn" onclick="window.toggleMenu(false)">&times;</button>
            <a href="#welcome" onclick="window.toggleMenu(false)">Welcome</a>
            <a href="#recent" onclick="window.toggleMenu(false)">Recent</a>
            <a href="#all" onclick="window.toggleMenu(false)">All Films</a>
            <a href="#recommended" onclick="window.toggleMenu(false)">Recommended</a>
            <a href="#region" onclick="window.toggleMenu(false)">By Region</a>
            <a href="#genre" onclick="window.toggleMenu(false)">By Genre</a>
        </div>
    </div>

    <main id="main-content">
        </main>

    <footer>
        <p>전설적인 영화 플랫폼 레터박스(Letterboxd)를 오마주하여 만든, 나만의 인생 영화 아카이빙 갤러리입니다.</p>
        <p>총 <span id="stats-total" style="color:#00e054; font-weight:bold;">0</span>편의 명작이 함께하고 있습니다.</p>
        <div class="footer-links">
            <a href="https://letterboxd.com/" target="_blank">Letterboxd</a>
            <a href="https://www.themoviedb.org/" target="_blank">TMDB</a>
        </div>
    </footer>

    <div class="modal-overlay" id="login-modal">
        <div class="modal-content">
            <h2>Sign In</h2>
            <p style="color: #9ab; font-size: 0.85rem; margin-bottom: 20px;">관리자 권한에 접근하시겠습니까?</p>
            <input type="email" id="login-email" placeholder="Email Address" style="margin-bottom: 10px;">
            <input type="password" id="login-password" placeholder="Password">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="window.closeLoginModal()">Cancel</button>
                <button class="btn-save" onclick="window.doLogin()">Sign In</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="movie-modal">
        <div class="modal-content">
            <h2 id="modal-title">Log a Film</h2>
            <input type="hidden" id="edit-index">
            
            <label>🔎 영화 자동 검색 (Name of Film)</label>
            <div class="tmdb-search-box">
                <input type="text" id="search-title-input" placeholder="영화 제목을 검색하세요" onkeypress="if(event.key === 'Enter') { window.searchTMDB(); event.preventDefault(); }">
                <button type="button" class="tmdb-search-btn" onclick="window.searchTMDB()">Search</button>
            </div>

            <div class="search-result-overlay" id="search-result-overlay">
                <div class="search-result-content">
                    <button type="button" class="close-search-btn" onclick="window.closeSearchOverlay()">&times;</button>
                    <h3 style="color:white; margin-top:0;">Search Results</h3>
                    <div id="tmdb-results-list"></div>
                </div>
            </div>
            
            <label>선택된 영화 (Title)</label>
            <input type="text" id="input-title" required>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>국가 (Region)</label>
                    <select id="input-region" required>
                        <option value="한국">한국</option>
                        <option value="서양">서양 (미국/유럽 등)</option>
                        <option value="일본">일본</option>
                        <option value="홍콩">홍콩</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>장르 (Genre)</label>
                    <input type="text" id="input-genre" placeholder="ex: 스릴러" required>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>감독 (Director)</label>
                    <input type="text" id="input-director" required>
                </div>
                <div style="flex: 1;">
                    <label>연도 (Year)</label>
                    <input type="number" id="input-year" required>
                </div>
                <div style="flex: 1;">
                    <label>평점 (Rating)</label>
                    <input type="number" id="input-rating" step="0.5" min="0" max="5" required>
                </div>
            </div>

            <label>시청 날짜 (Date Watched)</label>
            <input type="date" id="input-watchDate" required>

            <label>리뷰 (Review / Memo) - #추천 포함 시 추천 목록에 표시</label>
            <textarea id="input-memo" rows="3" placeholder="기억에 남는 감상을 적어주세요." required></textarea>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="window.closeModal()">Cancel</button>
                <button class="btn-save" onclick="window.saveMovie()">Save</button>
            </div>
        </div>
    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1hcxeEpsGo-N75xyPxWb7RuTjspvpzNw",
            authDomain: "my-first-page-931dd.firebaseapp.com",
            projectId: "my-first-page-931dd",
            storageBucket: "my-first-page-931dd.firebasestorage.app",
            messagingSenderId: "905407958433",
            appId: "1:905407958433:web:e9ea7fa164807ad8ebcfe0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const TMDB_API_KEY = 'e278ce0c0cebe5a0bc50bbb80474f592';
        
        let movies = [];
        let isAdmin = false;

        // 🌟 로그인 상태 감지
        onAuthStateChanged(auth, (user) => {
            if (user && user.uid === 'LjObLa6943Q1xyyVthX2aFA1zRQ2') {
                isAdmin = true;
                document.getElementById('add-movie-btn').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'block';
                document.getElementById('auto-update-btn').style.display = 'block';
                document.getElementById('secret-login-btn').style.display = 'none';
            } else {
                isAdmin = false;
                document.getElementById('add-movie-btn').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'none';
                document.getElementById('auto-update-btn').style.display = 'none';
                document.getElementById('secret-login-btn').style.display = 'block';
            }
            if (movies.length > 0) renderAllSections();
        });

        window.openLoginModal = () => document.getElementById('login-modal').style.display = 'flex';
        window.closeLoginModal = () => document.getElementById('login-modal').style.display = 'none';
        
        window.doLogin = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.closeLoginModal();
            } catch (error) {
                alert("로그인에 실패했습니다.");
            }
        };

        window.doLogout = async () => {
            if(confirm("로그아웃 하시겠습니까?")) await signOut(auth);
        };

        window.toggleMenu = (open = null) => {
            const overlay = document.getElementById('side-menu-overlay');
            const menu = document.getElementById('side-menu');
            const isOpen = (open === null) ? !menu.classList.contains('open') : open;

            if (isOpen) {
                overlay.style.display = 'flex';
                setTimeout(() => menu.classList.add('open'), 10);
            } else {
                menu.classList.remove('open');
                setTimeout(() => overlay.style.display = 'none', 300);
            }
        };

        // 🌟 파이어베이스 로드
        async function loadMoviesFromFirebase() {
            document.getElementById('main-content').innerHTML = '<div class="section"><div style="color:#9ab; text-align:center;">Loading films... 🎞️</div></div>';
            try {
                const snapshot = await getDocs(collection(db, "myMoviesGallery"));
                movies = [];
                snapshot.forEach(doc => { movies.push({ ...doc.data(), id: doc.id }); });
                renderAllSections();
            } catch (error) {
                document.getElementById('main-content').innerHTML = '<div class="section"><div style="text-align:center; color:#e50914;">데이터를 불러오지 못했습니다.</div></div>';
            }
        }

        // --- 렌더링 함수들 ---
        function createPosterHTML(movie, originalIndex) {
            const ratingVal = parseFloat(movie.rating) || 0;
            const editBtnHTML = isAdmin ? `<button class="edit-btn" onclick="window.openModal(${originalIndex})">✏️</button>` : '';
            const posterSrc = movie.poster_path 
                ? `https://image.tmdb.org/t/p/w300_and_h450_bestv2${movie.poster_path}` 
                : 'https://via.placeholder.com/300x450/2c3440/9aabbb?text=No+Poster';

            return `
                <div class="movie-card">
                    ${editBtnHTML}
                    <div class="poster-wrapper">
                        <img src="${posterSrc}" alt="${movie.title || '영화 포스터'}" class="tmdb-poster" loading="lazy">
                    </div>
                    <div class="poster-overlay">
                        <div class="overlay-title">${movie.title || '제목 없음'}</div>
                        <div class="overlay-rating">★ ${ratingVal.toFixed(1)}</div>
                        ${movie.memo ? `<div class="overlay-memo">"${movie.memo}"</div>` : ''}
                    </div>
                </div>
            `;
        }

        function createSectionHTML(id, title, desc) {
            return `
                <section class="section" id="${id}">
                    <div class="section-header">
                        <h2 class="section-title">${title}</h2>
                        ${desc ? `<p class="section-desc">${desc}</p>` : ''}
                    </div>
                    <div class="movie-grid" id="grid-${id}"></div>
                </section>
            `;
        }

        function renderAllSections() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';
            document.getElementById('stats-total').innerText = movies.length;

            let displayMovies = movies.map((m, index) => ({...m, originalIndex: index}));
            displayMovies.sort((a, b) => new Date(b.watchDate || 0) - new Date(a.watchDate || 0));

            const topMovies = displayMovies.filter(m => parseFloat(m.rating) === 5.0).slice(0, 10);
            container.innerHTML += createSectionHTML('welcome', 'PERFECT 5.0', '최고의 평점을 준 완벽한 영화들입니다.');
            const welcomeGrid = document.getElementById('grid-welcome');
            if (topMovies.length > 0) topMovies.forEach(m => welcomeGrid.innerHTML += createPosterHTML(m, m.originalIndex));

            const recentMovies = displayMovies.slice(0, 8);
            container.innerHTML += createSectionHTML('recent', 'RECENTLY WATCHED', '가장 최근에 시청하고 기록한 영화 목록입니다.');
            const recentGrid = document.getElementById('grid-recent');
            if (recentMovies.length > 0) recentMovies.forEach(m => recentGrid.innerHTML += createPosterHTML(m, m.originalIndex));

            container.innerHTML += createSectionHTML('all', 'ALL FILMS', `지금까지 기록한 총 ${displayMovies.length}편의 영화들입니다.`);
            const allGrid = document.getElementById('grid-all');
            if (displayMovies.length > 0) displayMovies.forEach(m => allGrid.innerHTML += createPosterHTML(m, m.originalIndex));

            const recommendedMovies = displayMovies.filter(m => (m.memo || '').includes('#추천')).slice(0, 10);
            container.innerHTML += createSectionHTML('recommended', 'HIGHLY RECOMMENDED', '다른 사람에게 강력히 추천하고 싶은 영화들입니다.');
            const recommendedGrid = document.getElementById('grid-recommended');
            if (recommendedMovies.length > 0) recommendedMovies.forEach(m => recommendedGrid.innerHTML += createPosterHTML(m, m.originalIndex));

            container.innerHTML += '<div id="region" style="padding: 1px;"></div>';
            container.innerHTML += createSectionHTML('region-container', 'BY REGION', '국가별 영화 아카이브');
            
            container.innerHTML += '<div id="genre" style="padding: 1px;"></div>';
            container.innerHTML += createSectionHTML('genre-container', 'BY GENRE', '장르별 영화 아카이브');

            const regionGroups = {}; const genreGroups = {};
            displayMovies.forEach(m => {
                const r = m.region || '기타';
                if(!regionGroups[r]) regionGroups[r] = [];
                regionGroups[r].push(m);

                const g = (m.genre || '').includes('/') ? m.genre.split('/')[0] : (m.genre || '기타');
                if(!genreGroups[g]) genreGroups[g] = [];
                genreGroups[g].push(m);
            });

            const renderGroup = (targetId, groups) => {
                const targetContainer = document.getElementById(`grid-${targetId}`);
                const keys = Object.keys(groups).sort();
                keys.forEach(k => {
                    let html = `
                    <div style="grid-column: 1 / -1; margin-top: 20px; border-bottom: 1px solid #2c3440; padding-bottom: 5px;">
                        <span style="color: #9ab; font-size: 0.9rem; font-weight: bold;">${k} (${groups[k].length})</span>
                    </div>`;
                    targetContainer.innerHTML += html;
                    groups[k].sort((a,b) => new Date(b.watchDate || 0) - new Date(a.watchDate || 0)).forEach(m => targetContainer.innerHTML += createPosterHTML(m, m.originalIndex));
                });
            }

            renderGroup('region-container', regionGroups);
            renderGroup('genre-container', genreGroups);
        }

        // 💡 부활한 띄어쓰기 기계!
        function getSpaceVariations(str) {
            if (str.includes(' ') || str.length < 2 || str.length > 8) return [];
            const vars = [];
            if (str.length === 3) { vars.push(str.slice(0,1)+' '+str.slice(1), str.slice(0,2)+' '+str.slice(2)); }
            else if (str.length === 4) { vars.push(str.slice(0,2)+' '+str.slice(2), str.slice(0,1)+' '+str.slice(1), str.slice(0,3)+' '+str.slice(3)); }
            else if (str.length === 5) { vars.push(str.slice(0,2)+' '+str.slice(2), str.slice(0,3)+' '+str.slice(3)); }
            else if (str.length === 6) { vars.push(str.slice(0,2)+' '+str.slice(2), str.slice(0,3)+' '+str.slice(3), str.slice(0,4)+' '+str.slice(4)); }
            else if (str.length === 7) { vars.push(str.slice(0,3)+' '+str.slice(3), str.slice(0,4)+' '+str.slice(4)); }
            else if (str.length === 8) { vars.push(str.slice(0,4)+' '+str.slice(4)); }
            return vars;
        }

        // --- 마법의 포스터 자동 복구 함수 (띄어쓰기 무시 장착 완료!) ---
        window.autoFixPosters = async function() {
            if (!confirm("포스터가 없는 영화들을 TMDB에서 자동 검색하여 채워 넣습니다. 진행하시겠습니까?")) return;
            const btn = document.getElementById('auto-update-btn');
            btn.innerText = "⏳ 업데이트 중..."; btn.disabled = true;

            let updatedCount = 0;
            for (let i = 0; i < movies.length; i++) {
                const movie = movies[i];
                if (!movie.poster_path) {
                    try {
                        let searchQueries = [movie.title];
                        if (!movie.title.includes(' ')) {
                            searchQueries = searchQueries.concat(getSpaceVariations(movie.title));
                        }
                        
                        // 띄어쓰기 변형된 모든 검색어로 동시 검색!
                        const fetchPromises = searchQueries.map(q => 
                            fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=ko-KR&query=${encodeURIComponent(q)}&page=1`).then(res => res.json())
                        );
                        const responses = await Promise.all(fetchPromises);
                        
                        let allResults = [];
                        responses.forEach(data => {
                            if (data.results) allResults.push(...data.results);
                        });
                        
                        allResults.sort((a, b) => b.popularity - a.popularity);
                        
                        if (allResults.length > 0 && allResults[0].poster_path) {
                            const newPoster = allResults[0].poster_path;
                            await updateDoc(doc(db, "myMoviesGallery", movie.id), { poster_path: newPoster });
                            movie.poster_path = newPoster; 
                            updatedCount++;
                        }
                    } catch (e) { console.error(`${movie.title} 복구 실패`); }
                }
            }
            alert(`완료! ${updatedCount}편의 포스터를 복구했습니다.`);
            btn.innerText = "✨ 포스터 일괄 복구"; btn.style.display = 'none'; 
            renderAllSections(); 
        };

        // --- 검색 및 모달 제어 (띄어쓰기 무시 장착 완료!) ---
        window.searchTMDB = async function() {
            const query = document.getElementById('search-title-input').value.trim();
            if (!query) return;

            const resultsContainer = document.getElementById('tmdb-results-list');
            document.getElementById('search-result-overlay').style.display = 'flex';
            resultsContainer.innerHTML = '<div style="color:#9ab;">Searching... 🚀</div>';

            try {
                let searchQueries = [query];
                if (!query.includes(' ')) {
                    searchQueries = searchQueries.concat(getSpaceVariations(query));
                }
                
                const fetchPromises = searchQueries.map(q => 
                    fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=ko-KR&query=${encodeURIComponent(q)}&page=1`).then(res => res.json())
                );
                const responses = await Promise.all(fetchPromises);
                
                let allMovies = [];
                responses.forEach(data => {
                    if (data.results) allMovies.push(...data.results);
                });
                
                // 중복 제거
                const uniqueMovies = [];
                const seenIds = new Set();
                for (const movie of allMovies) {
                    if (!seenIds.has(movie.id)) {
                        seenIds.add(movie.id);
                        uniqueMovies.push(movie);
                    }
                }
                
                uniqueMovies.sort((a, b) => b.popularity - a.popularity);

                if (uniqueMovies.length > 0) {
                    const top10 = uniqueMovies.slice(0, 10);
                    const detailedResults = await Promise.all(top10.map(async movie => {
                        const detailUrl = `https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&language=ko-KR&append_to_response=credits`;
                        const detailRes = await fetch(detailUrl); return await detailRes.json();
                    }));

                    resultsContainer.innerHTML = ''; 
                    detailedResults.forEach(movie => {
                        const year = movie.release_date ? movie.release_date.split('-')[0] : '-';
                        const posterSrc = movie.poster_path ? `https://image.tmdb.org/t/p/w92${movie.poster_path}` : ''; 
                        let directorName = '-';
                        if (movie.credits && movie.credits.crew) {
                            const dir = movie.credits.crew.find(p => p.job === 'Director');
                            if (dir) directorName = dir.name;
                        }
                        let genreName = movie.genres && movie.genres.length > 0 ? movie.genres[0].name : '';
                        
                        const item = document.createElement('div');
                        item.className = 'tmdb-item';
                        item.innerHTML = `
                            <img src="${posterSrc}" alt="" class="tmdb-poster-small">
                            <div class="tmdb-info-small">
                                <span class="tmdb-item-title-small">${movie.title}</span>
                                <span class="tmdb-item-meta-small">${year} • ${directorName}</span>
                            </div>
                        `;
                        item.onclick = () => window.fillFormData(movie.title, year, directorName, genreName, movie.poster_path);
                        resultsContainer.appendChild(item);
                    });
                } else {
                    resultsContainer.innerHTML = `<div style="color:#9ab;">검색 결과가 없습니다.</div>`;
                }
            } catch (e) { resultsContainer.innerHTML = '<div style="color:red;">오류 발생</div>'; }
        }

        window.fillFormData = function(title, year, director, genre, posterPath) {
            document.getElementById('input-title').value = title;
            if (year !== '-') document.getElementById('input-year').value = year;
            if (director !== '-') document.getElementById('input-director').value = director;
            if (genre !== '') document.getElementById('input-genre').value = genre;
            if (posterPath) document.getElementById('edit-index').setAttribute('data-poster-path', posterPath);
            document.getElementById('search-title-input').value = '';
            window.closeSearchOverlay();
        }

        window.closeSearchOverlay = () => document.getElementById('search-result-overlay').style.display = 'none';

        function getTodayString() {
            const t = new Date(); return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`;
        }

        window.openModal = function(index = -1) {
            document.getElementById('movie-modal').style.display = 'flex';
            window.closeSearchOverlay(); 
            document.getElementById('search-title-input').value = ''; 
            document.getElementById('edit-index').removeAttribute('data-poster-path');
            
            if(index >= 0) {
                document.getElementById('modal-title').innerText = 'Edit Film ✏️';
                document.getElementById('edit-index').value = index;
                document.getElementById('input-title').value = movies[index].title || '';
                document.getElementById('input-region').value = movies[index].region || '한국';
                document.getElementById('input-genre').value = movies[index].genre || '';
                document.getElementById('input-director').value = movies[index].director || '';
                document.getElementById('input-year').value = movies[index].year || '';
                document.getElementById('input-rating').value = movies[index].rating || '';
                document.getElementById('input-watchDate').value = movies[index].watchDate || getTodayString();
                document.getElementById('input-memo').value = movies[index].memo || '';
                if (movies[index].poster_path) document.getElementById('edit-index').setAttribute('data-poster-path', movies[index].poster_path);
            } else {
                document.getElementById('modal-title').innerText = 'Log a New Film 🍿';
                document.getElementById('edit-index').value = '';
                document.getElementById('input-title').value = '';
                document.getElementById('input-region').value = '한국';
                document.getElementById('input-genre').value = '';
                document.getElementById('input-director').value = '';
                document.getElementById('input-year').value = '';
                document.getElementById('input-rating').value = '';
                document.getElementById('input-watchDate').value = getTodayString();
                document.getElementById('input-memo').value = '';
            }
        }

        window.closeModal = () => document.getElementById('movie-modal').style.display = 'none';

        window.saveMovie = async function() {
            const index = document.getElementById('edit-index').value;
            const newObj = {
                title: document.getElementById('input-title').value,
                region: document.getElementById('input-region').value,
                genre: document.getElementById('input-genre').value,
                director: document.getElementById('input-director').value,
                year: parseInt(document.getElementById('input-year').value),
                rating: parseFloat(document.getElementById('input-rating').value),
                watchDate: document.getElementById('input-watchDate').value,
                memo: document.getElementById('input-memo').value,
                poster_path: document.getElementById('edit-index').getAttribute('data-poster-path') || null
            };

            if(!newObj.title || isNaN(newObj.year) || isNaN(newObj.rating) || !newObj.watchDate) {
                alert('필수 정보를 입력해주세요!'); return;
            }

            const btn = document.querySelector('.btn-save'); btn.innerText = "Saving..."; btn.disabled = true;

            try {
                if(index !== '') {
                    const movieId = movies[parseInt(index)].id;
                    await updateDoc(doc(db, "myMoviesGallery", movieId), newObj);
                    movies[parseInt(index)] = { ...newObj, id: movieId };
                } else {
                    const docRef = await addDoc(collection(db, "myMoviesGallery"), newObj);
                    movies.push({ ...newObj, id: docRef.id });
                }
                window.closeModal(); renderAllSections(); 
            } catch (error) { alert("저장 에러 발생"); } 
            finally { btn.innerText = "Save"; btn.disabled = false; }
        }

        loadMoviesFromFirebase();
    </script>
</body>
